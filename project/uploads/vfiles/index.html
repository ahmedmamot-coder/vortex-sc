// Current models: "claude-sonnet-5" (best value), "claude-haiku-4-5-20251001" (cheapest/fastest), "claude-opus-4-8" (most capable).
const AI_MODEL="claude-sonnet-5";
async function callAI(prompt, system){
  const key=sGet(SK.ai)||"";
  if(!key)throw new Error("NO_KEY");
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{
      "content-type":"application/json",
      "x-api-key":key,
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true"
    },
    body:JSON.stringify({
      model:AI_MODEL,
      max_tokens:3000,
      system:system||"You are an expert swimming coach assistant for Vortex Swimming Club in Doha, Qatar. You follow structured energy-system training (EN1 aerobic, EN2 threshold, VO2 max, SP1/SP2/SP3 sprint) and the Maglischo and Olbrecht methodologies. Be concise, practical, and professional.",
      messages:[{role:"user",content:prompt}]
    })
  }).catch(e=>{throw new Error("Network error — check your connection (or a browser extension may be blocking the request).");});
  if(!res.ok){
    let msg=""; try{const j=await res.json(); msg=j?.error?.message||"";}catch(e){ try{msg=await res.text();}catch(e2){} }
    if(res.status===401)throw new Error("BAD_KEY");
    if(res.status===400&&/model/i.test(msg))throw new Error("This model isn't available on your key. Update AI_MODEL in the code.");
    if(res.status===402||res.status===429)throw new Error("Your Anthropic account is out of credit or rate-limited. Add credit at console.anthropic.com → Billing.");
    if(res.status>=500)throw new Error("Anthropic is busy right now — please try again in a moment.");
    throw new Error(`API error ${res.status}: ${(msg||"").slice(0,140)}`);
  }
  const data=await res.json();
  const text=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n").trim();
  return text||"The model returned no text (it may have run out of tokens). Try a shorter request.";
}

const HYS={
  A:"Free",B:"Back",C:"Breast",D:"Fly",E:"IM",F:"Free",
  a:"Free",b:"Back",c:"Breast",d:"Fly",e:"IM",f:"Free",
  "1":"Free","2":"Back","3":"Breast","4":"Fly","5":"IM","6":"Free",
  "A":"Free","B":"Back","C":"Breast","D":"Fly","E":"IM"
};
const STROKE_WORDS={
  freestyle:"Free",free:"Free",fr:"Free",
  backstroke:"Back",back:"Back",bk:"Back",
  breaststroke:"Breast",breast:"Breast",br:"Breast",
  butterfly:"Fly",fly:"Fly",fl:"Fly",
  "individual medley":"IM","ind medley":"IM","ind. medley":"IM",
  medley:"IM",im:"IM"
};
const DIST_MAP={"50":50,"100":100,"200":200,"400":400,"800":800,"1500":1500,"1000":1000,"1650":1650};

function resolveStroke(s){
  if(!s)return null;
  const t=String(s).trim();
  if(HYS[t])return HYS[t];
  if(HYS[t.toUpperCase()])return HYS[t.toUpperCase()];
  const l=t.toLowerCase();
  for(const[k,v]of Object.entries(STROKE_WORDS)){if(l===k||l.startsWith(k))return v;}
  return null;
}

function hyEvent(dist,stroke){
  const d=String(dist||"").replace(/\D/g,"").replace(/^0+/,"");
  if(!d)return null;
  const n=resolveStroke(stroke);
  if(!n)return null;
  const k=`${d} ${n}`;
  return STROKES.includes(k)?k:(STROKES.find(o=>o===k)||STROKES.find(o=>o.startsWith(d+" "))||null);
}

function hyTime(raw){
  if(!raw)return"NT";
  const t=String(raw).trim().replace(/[YySsLlMm]$/,"").trim();
  if(!t||t==="0"||/^[0.\-\s]+$/.test(t))return"NT";
  if(/^(NT|NTY|NS|SCR|DNF|DNS|X|NC|NP)$/i.test(t))return"NT";
  if(/^(DQ|DSQ|DQS|DISQ|DIS)$/i.test(t))return"DQ";
  // already formatted mm:ss.cc
  if(/^\d{1,2}:\d{2}\.\d{1,2}$/.test(t))return t;
  // ss.cc
  if(/^\d{1,2}\.\d{2}$/.test(t))return t;
  // 6-digit packed: MMSSCC
  if(/^\d{6}$/.test(t)){
    const mm=+t.slice(0,2),ss=t.slice(2,4),cc=t.slice(4,6);
    if(mm===0&&+ss===0&&+cc===0)return"NT";
    return mm>0?`${mm}:${ss}.${cc}`:`${+ss}.${cc}`;
  }
  // 5-digit: MSSCC
  if(/^\d{5}$/.test(t)){
    const mm=+t.slice(0,1),ss=t.slice(1,3),cc=t.slice(3,5);
    return mm>0?`${mm}:${ss}.${cc}`:`${+ss}.${cc}`;
  }
  // 4-digit: SSCC
  if(/^\d{4}$/.test(t)){
    const ss=t.slice(0,2),cc=t.slice(2,4);
    return `${+ss}.${cc}`;
  }
  // m:ss or m:ss.c
  if(/^\d:\d{2}(\.\d{1,2})?$/.test(t))return t.includes(".")?t:`${t}.00`;
  return t;
}

function parseName(raw){
  // handles "LAST, FIRST" or "FIRST LAST" or "LAST FIRST"
  if(!raw)return"";
  const t=raw.trim();
  if(t.includes(",")){
    const [last,first]=t.split(",").map(x=>x.trim());
    return `${first} ${last}`.trim();
  }
  return t;
}

function parseHytek(text){
  const logs=[],meta={meetName:"",date:""},entries=[],results=[];
  let isResults=false;
  if(!text?.trim()){logs.push("⚠ Empty file");return{entries,results,meta,logs,isResults};}

  // Normalise line endings, remove BOM
  const lines=text.replace(/^\uFEFF/,"").replace(/\r\n/g,"\n").replace(/\r/g,"\n").split("\n");
  logs.push(`Total lines: ${lines.length}`);

  // Count record codes
  const codes={};
  lines.forEach(l=>{
    const m=l.match(/^([A-Za-z]\d)/);
    if(m)codes[m[1].toUpperCase()]=(codes[m[1].toUpperCase()]||0)+1;
  });
  logs.push("Record codes: "+Object.entries(codes).map(([k,v])=>`${k}=${v}`).join(" "));

  // Meet name from B1/B2
  const bRec=lines.find(l=>/^B[12]/i.test(l));
  if(bRec)meta.meetName=bRec.slice(2,82).trim();

  const sl=(L,s,e)=>String(L||"").slice(s,Math.min(e,L.length)).trim();

  // ═══════════════════════════════════════════════════════════
  // STRATEGY 1 — SDIF (.sd3) format
  // Record A0=meet, C1=swimmer, D0=individual result on ONE LINE
  // ═══════════════════════════════════════════════════════════
  if(codes["C1"]>0&&codes["D0"]>0){
    logs.push("→ Strategy: SDIF (C1/D0)");
    const swimmerMap={};
    // parse C1 swimmer records
    lines.forEach(L=>{
      if(!L.startsWith("C1"))return;
      // C1: cols 2-29=last, 30-49=first, 50-51=MI, 52=gender, 53-54=age
      const last=sl(L,2,28),first=sl(L,28,48),gender=sl(L,48,49)||sl(L,52,53),age=sl(L,53,55)||sl(L,49,51);
      const id=sl(L,0,2)+"_"+last+"_"+first;
      const name=parseName(`${last}, ${first}`);
      if(name)swimmerMap[id]={name,gender,age};
    });
    // parse D0 result records
    let sw=null;
    lines.forEach(L=>{
      if(L.startsWith("C1")){
        const last=sl(L,2,28),first=sl(L,28,48),gender=sl(L,48,49)||sl(L,52,53),age=sl(L,53,55)||sl(L,49,51);
        sw={name:parseName(`${last}, ${first}`),gender,age,team:sl(L,84,88)||sl(L,80,84)||""};
      }
      if(!L.startsWith("D0")||!sw)return;
      // D0: stroke@12, dist@13-16, seedtime@17-23, finaltime@24-30, place@31-33, heat@34-35, lane@36-37
      const stroke=sl(L,12,13),dist=sl(L,13,17).replace(/\D/g,"");
      const seed=hyTime(sl(L,17,23)),fin=hyTime(sl(L,23,29));
      const place=parseInt(sl(L,29,32))||"",heat=parseInt(sl(L,32,34))||"",lane=parseInt(sl(L,34,36))||"";
      const dqf=sl(L,36,37),isDQ=dqf==="2"||dqf==="5"||/^(DQ|1)$/i.test(dqf);
      const ev=hyEvent(dist,stroke);if(!ev)return;
      const best=fin!=="NT"&&fin!=="DQ"?fin:seed!=="NT"?seed:"NT";
      if(best!=="NT"&&best!=="DQ")isResults=true;
      const row={swimmerName:sw.name,age:sw.age||"",gender:sw.gender||"",team:sw.team||"",event:ev,seedTime:seed,finalTime:isDQ?"DQ":best,place,heat,lane,dq:isDQ};
      entries.push(row);if(isDQ||best!=="NT")results.push(row);
    });
    if(entries.length>0){logs.push(`✅ SDIF: ${entries.length} entries, ${results.length} results`);return{entries,results,meta,logs,isResults};}
    logs.push("SDIF got 0, trying next…");
  }

  // ═══════════════════════════════════════════════════════════
  // STRATEGY 2 — HY3/MM format (D0 swimmer + E0 event)
  // ═══════════════════════════════════════════════════════════
  const swC=["D0","D1","D2","D3"].find(c=>codes[c]>0)||"D0";
  const evC=["E0","E1","E2","E3","F0","F1"].find(c=>codes[c]>0)||null;

  if(evC){
    logs.push(`→ Strategy: HY3/MM (${swC}+${evC})`);
    let sw=null,swP=0,evP=0,evSk=0;

    for(const L of lines){
      if(L.length<3)continue;
      const id=L.slice(0,2).toUpperCase();

      if(id===swC){
        // Try multiple column offsets for swimmer name
        let last="",first="",age="",gender="",team="";
        // Layout A: standard MM (2-char rec code, no org/check)
        last=sl(L,2,28);first=sl(L,28,48);
        age=sl(L,48,50);gender=sl(L,50,51);team=sl(L,52,56)||sl(L,51,55);
        // Layout B: with org code (+4)
        if(!last.trim()){last=sl(L,6,32);first=sl(L,32,52);age=sl(L,52,54);gender=sl(L,54,55);team=sl(L,56,60);}
        // Token fallback
        if(!last.trim()&&!first.trim()){
          const raw=L.slice(2);
          const comma=raw.indexOf(",");
          if(comma>0){last=raw.slice(0,comma).trim();first=raw.slice(comma+1).split(/\s+/)[0]||"";}
          else{const tok=raw.split(/\s{2,}|\t/).map(x=>x.trim()).filter(Boolean);if(tok.length>=2){last=tok[0];first=tok[1];}}
          age=raw.match(/\b(\d{1,2})\b/)?.[1]||"";
          gender=raw.match(/\b([MF])\b/i)?.[1]||"";
          team=raw.match(/\b([A-Z]{2,6})\b/)?.[1]||"";
        }
        const name=first&&last?`${first} ${last}`.replace(/\s+/," ").trim():(first||last||"").trim();
        if(name){sw={name,age,gender,team};swP++;}
        continue;
      }

      if(id===evC&&sw){
        // Try 6 different column layouts covering all known MM/TM versions
        const tryLayouts=()=>{
          const tries=[
            // Standard MM exported CL2 (most common)
            {stroke:sl(L,10,11),dist:sl(L,11,15),seed:sl(L,15,21),pre:sl(L,21,27),fin:sl(L,27,33),place:sl(L,33,36),heat:sl(L,36,38),lane:sl(L,38,40),dqf:sl(L,40,41)},
            // +2 offset variant
            {stroke:sl(L,12,13),dist:sl(L,13,17),seed:sl(L,17,23),pre:sl(L,23,29),fin:sl(L,29,35),place:sl(L,35,38),heat:sl(L,38,40),lane:sl(L,40,42),dqf:sl(L,42,43)},
            // +4 offset (org check digits)
            {stroke:sl(L,14,15),dist:sl(L,15,19),seed:sl(L,19,25),pre:sl(L,25,31),fin:sl(L,31,37),place:sl(L,37,40),heat:sl(L,40,42),lane:sl(L,42,44),dqf:sl(L,44,45)},
            // TM6 variant
            {stroke:sl(L,8,9),dist:sl(L,9,13),seed:sl(L,13,19),pre:sl(L,19,25),fin:sl(L,25,31),place:sl(L,31,34),heat:sl(L,34,36),lane:sl(L,36,38),dqf:sl(L,38,39)},
            // Longer offset
            {stroke:sl(L,16,17),dist:sl(L,17,21),seed:sl(L,21,27),pre:sl(L,27,33),fin:sl(L,33,39),place:sl(L,39,42),heat:sl(L,42,44),lane:sl(L,44,46),dqf:sl(L,46,47)},
          ];
          for(const t of tries){
            const dist=t.dist.replace(/\D/g,"");
            const ev=hyEvent(dist,t.stroke);
            if(ev){
              const seed=hyTime(t.seed),pre=hyTime(t.pre),fin=hyTime(t.fin);
              const isDQ=t.dqf==="1"||t.dqf==="2"||/^(DQ|Y|yes)$/i.test(t.dqf);
              const best=[fin,pre,seed].find(x=>x!=="NT"&&x!=="DQ")||"NT";
              return{ev,seed,fin:isDQ?"DQ":best,place:parseInt(t.place)||"",heat:parseInt(t.heat)||"",lane:parseInt(t.lane)||"",isDQ};
            }
          }
          // Last resort: regex scan the whole line
          const allTimes=[...L.matchAll(/\b(\d{1,2}:\d{2}\.\d{2}|\d{2}\.\d{2})\b/g)].map(m=>hyTime(m[1]));
          const distM=L.match(/\b(1500|800|400|200|100|50)\b/);
          const strokeM=L.match(/\b([ABCDE1-6])\b/i);
          if(distM&&strokeM&&allTimes.length>0){
            const ev=hyEvent(distM[1],strokeM[1]);
            if(ev){
              const fin=allTimes[allTimes.length-1];
              return{ev,seed:allTimes[0]||"NT",fin,place:"",heat:"",lane:"",isDQ:false};
            }
          }
          return null;
        };

        const r=tryLayouts();
        if(!r){evSk++;continue;}
        evP++;
        if(r.fin!=="NT"&&r.fin!=="DQ")isResults=true;
        const row={swimmerName:sw.name,age:sw.age||"",gender:sw.gender||"",team:sw.team||"",event:r.ev,seedTime:r.seed,finalTime:r.fin,place:r.place,heat:r.heat,lane:r.lane,dq:r.isDQ};
        entries.push(row);
        if(r.isDQ||r.fin!=="NT")results.push(row);
      }
    }
    logs.push(`✅ HY3/MM: swimmers=${swP} events_ok=${evP} skipped=${evSk}`);
    if(entries.length>0)return{entries,results,meta,logs,isResults};
    logs.push("HY3/MM got 0, trying SDIF D0 comma format…");
  }

  // ═══════════════════════════════════════════════════════════
  // STRATEGY 3 — SDIF comma format (D0 has LAST,FIRST inline)
  // ═══════════════════════════════════════════════════════════
  const d0Lines=lines.filter(l=>/^D0/i.test(l)&&l.includes(","));
  logs.push(`→ Strategy: SDIF comma-D0 (${d0Lines.length} lines)`);
  let parsed=0,skipped=0;

  for(const L of d0Lines){
    const ci=L.indexOf(",");if(ci<0){skipped++;continue;}
    const rawLast=L.slice(2,ci).replace(/^[\d\s]{0,5}/,"").trim();
    const afterComma=L.slice(ci+1);
    const toks=afterComma.trim().split(/\s+/).filter(Boolean);
    const firstName=toks[0]||"";
    let base=1;
    // skip middle initial
    if(toks[1]&&toks[1].length<=2&&/^[A-Z\.]+$/.test(toks[1]))base=2;
    const name=`${firstName} ${rawLast}`.replace(/\s+/," ").trim();
    if(!name||name.length<3){skipped++;continue;}

    const rest=toks.slice(base);
    // gender
    const gIdx=rest.findIndex(t=>/^[MF]$/i.test(t));
    const gender=gIdx>=0?rest[gIdx].toUpperCase():"";
    // age
    const ageIdx=rest.findIndex(t=>/^\d{1,2}$/.test(t)&&+t>=5&&+t<100);
    const age=ageIdx>=0?rest[ageIdx]:"";
    // team: 2-6 uppercase letters
    const team=rest.find(t=>/^[A-Z]{2,6}$/.test(t))||"";

    // find all times in the line
    const allTimes=[...L.matchAll(/\b(\d{1,2}:\d{2}\.\d{2}|\d{2}\.\d{2})\b/g)].map(m=>m[1]);
    // find distance
    const distM=L.match(/\b(1500|800|400|200|100|50)\b/);
    // find stroke code
    let stroke="",dist="";
    if(distM)dist=distM[1];
    const strokeM=L.match(/\b([ABCDE])([LMS]?)\s+(\d{2,4})\b/i)||L.match(/\b([1-6])([LMS]?)\s+(\d{2,4})\b/);
    if(strokeM){stroke=strokeM[1];if(!dist)dist=strokeM[3];}
    else{
      // try combined e.g. "B0100" or "A 050"
      const cm=L.match(/\b([ABCDE1-6])0*(\d{2,4})\b/i);
      if(cm){stroke=cm[1];dist=dist||cm[2];}
    }

    // times: first=seed, last=final
    const seedTime=allTimes.length>0?hyTime(allTimes[0]):"NT";
    const finalTime=allTimes.length>0?hyTime(allTimes[allTimes.length-1]):"NT";
    const dq=/\b(DQ|DSQ|DISQ)\b/i.test(L)||finalTime==="DQ";

    const ev=hyEvent(dist,stroke);
    if(!ev){skipped++;continue;}
    parsed++;
    if(finalTime!=="NT"&&finalTime!=="DQ")isResults=true;
    const row={swimmerName:name,age,gender,team,event:ev,seedTime,finalTime:dq?"DQ":finalTime,place:"",heat:"",lane:"",dq};
    entries.push(row);
    if(dq||finalTime!=="NT")results.push(row);
  }

  logs.push(`✅ SDIF comma: parsed=${parsed} skipped=${skipped} entries=${entries.length}`);
  if(entries.length===0)logs.push("⚠ Could not parse any records. Please paste a sample of your file.");
  return{entries,results,meta,logs,isResults};
}

function planTxt(p,note){
  const d=fmtD(p.date);
  let t=`🏊 *VORTEX SWIMMING CLUB*\n📋 *TRAINING SESSION PLAN*\n📅 *${d}*\n`;
  if(p.dist)t+=`■ *TOTAL: ${p.dist}m*\n`;
  t+="━".repeat(30)+"\n";
  if(p.warmup)t+=`\n🔵 *WARM UP*\n${p.warmup}\n`;
  if(p.mainSet)t+=`\n🔴 *MAIN SET*\n${p.mainSet}\n`;
  if(p.cooldown)t+=`\n🟢 *SWIM DOWN*\n${p.cooldown}\n`;
  if(p.notes)t+=`\n📝 ${p.notes}\n`;
  if(note)t+=`\n📌 *Note:* ${note}\n`;
  t+="\n"+"━".repeat(30)+`\n_VORTEX SC · ${d}_`;
  return t;
}

  return `<!DOCTYPE html><html><head><meta charset="UTF-8"/><style>body{font-family:Arial;font-size:13px;background:#fff;color:#111;margin:0}#tb{background:#0040cc;color:#fff;padding:8px 20px;display:flex;justify-content:space-between;align-items:center}#tb button{background:#fff;color:#0040cc;border:none;border-radius:7px;padding:5px 14px;font-weight:700;cursor:pointer}.ban{background:#0055ff;color:#fff;padding:16px 28px;display:flex;justify-content:space-between;-webkit-print-color-adjust:exact}.ct{padding:14px 28px}.sec{margin-bottom:12px;border-radius:6px;overflow:hidden;border:1px solid #dde}.sh{padding:7px 14px;font-size:10px;font-weight:700;letter-spacing:2px;color:#fff;text-transform:uppercase;-webkit-print-color-adjust:exact}.sb{padding:10px 14px;font-size:12px;line-height:1.85;white-space:pre-wrap;background:#f8faff}@media print{#tb{display:none}}</style></head><body><div id="tb"><b>VORTEX SC · ${d}</b><button onclick="window.print()">🖨️ Print/PDF</button></div><div class="ban"><div style="font-size:20px;font-weight:900;letter-spacing:4px">VORTEX</div><div style="text-align:right;font-size:20px;font-weight:900">${d}</div></div><div class="ct">${p.warmup?`<div class="sec"><div class="sh" style="background:#2563eb">Warm Up</div><div class="sb">${esc(p.warmup)}</div></div>`:""} ${p.mainSet?`<div class="sec"><div class="sh" style="background:#1d4ed8">Main Set${p.dist?" — "+p.dist+"m":""}</div><div class="sb">${esc(p.mainSet)}</div></div>`:""} ${p.cooldown?`<div class="sec"><div class="sh" style="background:#059669">Swim Down</div><div class="sb">${esc(p.cooldown)}</div></div>`:""} ${p.notes?`<div class="sec"><div class="sh" style="background:#374151">Notes</div><div class="sb">${esc(p.notes)}</div></div>`:""}</div></body></html>`;
}

// ── AI panel reusable component ────────────────────────────────
function AIPanel({title,placeholder,buildPrompt,system,suggestions,icon}){
  const [input,setInput]=useState("");
  const [out,setOut]=useState("");
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  const [hasKey,setHasKey]=useState(!!sGet(SK.ai));
  const [keyDraft,setKeyDraft]=useState("");
  const saveKey=()=>{const k=keyDraft.trim();if(k){sSet(SK.ai,k);setHasKey(true);setKeyDraft("");setErr("");}};
  const run=async(promptText)=>{
    setErr("");setOut("");setLoading(true);
    try{
      const result=await callAI(buildPrompt(promptText),system);
      setOut(result);
    }catch(e){
      if(e.message==="NO_KEY")setErr("NO_KEY");
      else if(e.message==="BAD_KEY")setErr("Invalid API key. Check Settings.");
      else setErr(e.message);
    }
    setLoading(false);
  };
  return <div style={{display:"flex",flexDirection:"column",gap:14}}>
    <div style={{display:"flex",alignItems:"center",gap:10}}>
      <div style={{width:40,height:40,borderRadius:12,background:C.b2+"15",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>{icon}</div>
      <div><div style={{fontSize:17,fontWeight:800}}>{title}</div><div style={{fontSize:11,color:C.muted}}>Powered by Claude AI</div></div>
    </div>
    {!hasKey&&<div style={{background:C.warnBg,border:`1px solid ${C.warn}30`,borderRadius:12,padding:14,fontSize:12,color:C.warn,lineHeight:1.6}}>
      <div style={{marginBottom:10}}>⚙️ AI runs on Claude via the Anthropic API and needs a key with a little credit (~1¢ per request). Paste your key below to enable it on this device — it stays only in this browser.</div>
      <div style={{display:"flex",gap:8}}>
        <input type="password" value={keyDraft} onChange={e=>setKeyDraft(e.target.value)} placeholder="sk-ant-…" style={{...IS,fontFamily:"monospace",flex:1}}/>
        <button onClick={saveKey} style={{...mkBtn(C.warn),padding:"10px 16px",borderRadius:10,boxShadow:"none"}}>Save</button>
      </div>
      <div style={{marginTop:8,fontSize:11}}>Get a key at <b>console.anthropic.com</b> → API Keys, then add a few $ under Billing.</div>
    </div>}
    {suggestions&&<div style={{display:"flex",flexWrap:"wrap",gap:8}}>
      {suggestions.map(s=><div key={s} onClick={()=>{setInput(s);run(s);}} style={{background:"#f0f4ff",border:`1px solid ${C.border}`,borderRadius:20,padding:"7px 14px",fontSize:12,cursor:"pointer",color:C.b2,fontWeight:600}}>{s}</div>)}
    </div>}
    <textarea value={input} onChange={e=>setInput(e.target.value)} placeholder={placeholder} rows={3} style={{...IS,resize:"vertical",fontSize:13,lineHeight:1.6}}/>
    <button onClick={()=>input.trim()&&run(input)} disabled={loading} style={{...mkBtn(),background:loading?C.muted:C.grad,opacity:loading?.7:1}}>{loading?"🤔 Thinking…":"✨ Generate"}</button>
    {err&&err!=="NO_KEY"&&<div style={{color:C.err,fontSize:12,background:C.errBg,border:`1px solid ${C.err}30`,borderRadius:10,padding:12}}>{err}</div>}
    {out&&<Box style={{padding:18,whiteSpace:"pre-wrap",fontSize:13,lineHeight:1.8,color:C.text}}>{out}</Box>}
  </div>;
}

// ── SWIMMER ANALYSIS ───────────────────────────────────────────
function SwimmerAnalysis({swimmers,results,group}){
  const mySw=group?swimmers.filter(s=>s.group===group):swimmers;
  const [selId,setSelId]=useState(mySw[0]?.id||"");
  const sw=swimmers.find(s=>s.id===selId)||mySw[0];
  if(!sw)return <Box style={{textAlign:"center",padding:40,color:C.muted}}>No swimmers to analyse.</Box>;
  const swResults=results.filter(r=>r.swimmerId===sw.id||r.swimmerName?.toLowerCase()===sw.name?.toLowerCase());
  const pbCount=Object.keys(sw.pbs||{}).length;
  // group results by event
  const byEvent={};
  swResults.forEach(r=>{if(r.dq||r.time==="DQ"||r.time==="NT")return;if(!byEvent[r.event])byEvent[r.event]=[];byEvent[r.event].push(r);});
  return <div style={{display:"flex",flexDirection:"column",gap:14}}>
    <div style={{fontSize:18,fontWeight:800}}>📈 Swimmer Analysis</div>
    <select value={selId} onChange={e=>setSelId(e.target.value)} style={IS}>{mySw.map(s=><option key={s.id} value={s.id}>{s.name} ({s.group})</option>)}</select>
    <div style={{background:C.grad,borderRadius:18,padding:20,color:"#fff"}}>
      <div style={{display:"flex",alignItems:"center",gap:14}}>
        <div style={{width:54,height:54,borderRadius:"50%",background:"rgba(255,255,255,.25)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:20}}>{sw.name.slice(0,2).toUpperCase()}</div>
        <div><div style={{fontSize:19,fontWeight:800}}>{sw.name}</div><div style={{fontSize:12,opacity:.85}}>{sw.group}{getAge(sw.dob)?` · ${getAge(sw.dob)} yrs`:""} · {sw.course||"LCM"}</div></div>
      </div>
      <div style={{display:"flex",gap:24,marginTop:16}}>
        {[[pbCount,"PBs"],[swResults.length,"Races"],[Object.keys(byEvent).length,"Events"]].map(([v,l])=><div key={l}><div style={{fontSize:22,fontWeight:800}}>{v}</div><div style={{fontSize:10,opacity:.75,fontWeight:600}}>{l}</div></div>)}
      </div>
    </div>
    {pbCount>0&&<Box style={{padding:16}}>
      <div style={{fontWeight:700,marginBottom:12}}>🏅 Personal Bests by Event</div>
      {Object.entries(sw.pbs||{}).sort((a,b)=>STROKES.indexOf(a[0])-STROKES.indexOf(b[0])).map(([ev,t])=>(
        <div key={ev} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#f8faff",borderRadius:10,padding:"10px 14px",marginBottom:6}}>
          <span style={{fontWeight:600,fontSize:13}}>{ev}</span>
          <span style={{fontFamily:"monospace",fontWeight:700,color:C.b2,fontSize:15}}>{t}</span>
        </div>
      ))}
    </Box>}
    {Object.entries(byEvent).map(([ev,rows])=>{
      const sorted=[...rows].sort((a,b)=>toSec(a.time)-toSec(b.time));
      const best=sorted[0]?.time;
      const worst=sorted[sorted.length-1]?.time;
      return <Box key={ev} style={{padding:16}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
          <div style={{fontWeight:700}}>{ev}</div>
          <div style={{fontSize:11,color:C.muted}}>{rows.length} race{rows.length>1?"s":""}</div>
        </div>
        <div style={{display:"flex",gap:10,marginBottom:10}}>
          <div style={{flex:1,background:C.okBg,borderRadius:10,padding:"8px 12px"}}><div style={{fontSize:10,color:C.ok,fontWeight:700}}>BEST</div><div style={{fontFamily:"monospace",fontWeight:800,color:C.ok}}>{best}</div></div>
          {rows.length>1&&<div style={{flex:1,background:"#f8faff",borderRadius:10,padding:"8px 12px"}}><div style={{fontSize:10,color:C.muted,fontWeight:700}}>RANGE</div><div style={{fontFamily:"monospace",fontWeight:700,color:C.muted,fontSize:13}}>{worst}</div></div>}
        </div>
      </Box>;
    })}
    {pbCount===0&&swResults.length===0&&<Box style={{textAlign:"center",padding:40,color:C.muted}}><div style={{fontSize:32,marginBottom:10}}>📊</div><div style={{fontWeight:700}}>No data yet</div><div style={{fontSize:13,marginTop:4}}>Import results or add PBs to see analysis.</div></Box>}
  </div>;
}

// ── SWIMMER TRACKING ───────────────────────────────────────────
function SwimmerTracking({swimmers,group,tracking,setTr}){
  const mySw=group?swimmers.filter(s=>s.group===group):swimmers;
  const [selId,setSelId]=useState(mySw[0]?.id||"");
  const [show,setShow]=useState(false);
  const sw=swimmers.find(s=>s.id===selId);
  const [form,setForm]=useState({date:new Date().toISOString().slice(0,10),weight:"",height:"",restHR:"",sleep:"",wellness:"3",notes:""});
  const sf=(k,v)=>setForm(f=>({...f,[k]:v}));
  const myTr=tracking.filter(t=>t.swimmerId===selId).sort((a,b)=>b.date.localeCompare(a.date));
  const save=()=>{setTr([...tracking,{id:uid(),swimmerId:selId,...form}]);setShow(false);setForm({date:new Date().toISOString().slice(0,10),weight:"",height:"",restHR:"",sleep:"",wellness:"3",notes:""});};
  const mood=["😫","😕","😐","🙂","😄"];
  return <div style={{display:"flex",flexDirection:"column",gap:14}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div style={{fontSize:18,fontWeight:800}}>📋 Swimmer Tracking</div>
      <button onClick={()=>setShow(true)} style={{...mkBtn(),padding:"8px 16px",fontSize:12,borderRadius:10}}>+ Log</button>
    </div>
    <select value={selId} onChange={e=>setSelId(e.target.value)} style={IS}>{mySw.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select>
    {myTr.length===0&&<Box style={{textAlign:"center",padding:40,color:C.muted}}><div style={{fontSize:32,marginBottom:10}}>📋</div><div style={{fontWeight:700}}>No tracking data</div><div style={{fontSize:13,marginTop:4}}>Log weight, sleep, HR and wellness over time.</div></Box>}
    {myTr.map(t=>(
      <Box key={t.id} style={{padding:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div style={{fontWeight:700,fontSize:13}}>{fmtD(t.date)}</div>
          <div style={{fontSize:22}}>{mood[(+t.wellness||3)-1]}</div>
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
          {t.weight&&<span style={{background:"#f0f4ff",color:C.b2,borderRadius:8,padding:"4px 10px",fontSize:12,fontWeight:600}}>⚖️ {t.weight}kg</span>}
          {t.height&&<span style={{background:"#f0f4ff",color:C.b2,borderRadius:8,padding:"4px 10px",fontSize:12,fontWeight:600}}>📏 {t.height}cm</span>}
          {t.restHR&&<span style={{background:C.errBg,color:C.err,borderRadius:8,padding:"4px 10px",fontSize:12,fontWeight:600}}>❤️ {t.restHR}bpm</span>}
          {t.sleep&&<span style={{background:"#f5f0ff",color:C.parent,borderRadius:8,padding:"4px 10px",fontSize:12,fontWeight:600}}>😴 {t.sleep}h</span>}
        </div>
        {t.notes&&<div style={{fontSize:12,color:C.muted,marginTop:8}}>{t.notes}</div>}
        <span onClick={()=>setTr(tracking.filter(x=>x.id!==t.id))} style={{fontSize:11,color:C.err,cursor:"pointer",marginTop:6,display:"inline-block"}}>Delete</span>
      </Box>
    ))}
    {show&&<Pop title="Log Tracking Entry" onClose={()=>setShow(false)}>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div><div style={{fontSize:11,color:C.muted,fontWeight:600,marginBottom:5}}>DATE</div><input type="date" value={form.date} onChange={e=>sf("date",e.target.value)} style={IS}/></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div><div style={{fontSize:11,color:C.muted,fontWeight:600,marginBottom:5}}>⚖️ WEIGHT (kg)</div><input type="number" value={form.weight} onChange={e=>sf("weight",e.target.value)} style={IS}/></div>
          <div><div style={{fontSize:11,color:C.muted,fontWeight:600,marginBottom:5}}>📏 HEIGHT (cm)</div><input type="number" value={form.height} onChange={e=>sf("height",e.target.value)} style={IS}/></div>
          <div><div style={{fontSize:11,color:C.muted,fontWeight:600,marginBottom:5}}>❤️ REST HR</div><input type="number" value={form.restHR} onChange={e=>sf("restHR",e.target.value)} style={IS}/></div>
          <div><div style={{fontSize:11,color:C.muted,fontWeight:600,marginBottom:5}}>😴 SLEEP (h)</div><input type="number" value={form.sleep} onChange={e=>sf("sleep",e.target.value)} style={IS}/></div>
        </div>
        <div><div style={{fontSize:11,color:C.muted,fontWeight:600,marginBottom:8}}>WELLNESS</div>
          <div style={{display:"flex",gap:8,justifyContent:"space-between"}}>{mood.map((m,i)=><div key={i} onClick={()=>sf("wellness",String(i+1))} style={{flex:1,textAlign:"center",fontSize:26,padding:"8px 0",borderRadius:10,cursor:"pointer",background:form.wellness===String(i+1)?C.b2+"15":"#f8faff",border:`1.5px solid ${form.wellness===String(i+1)?C.b2:C.border}`}}>{m}</div>)}</div>
        </div>
        <div><div style={{fontSize:11,color:C.muted,fontWeight:600,marginBottom:5}}>NOTES</div><input value={form.notes} onChange={e=>sf("notes",e.target.value)} style={IS}/></div>
        <div style={{display:"flex",gap:8}}><button onClick={()=>setShow(false)} style={{...mkBtn("#6b7280",true),flex:1,boxShadow:"none"}}>Cancel</button><button onClick={save} style={{...mkBtn(),flex:2,background:C.grad}}>Save Entry</button></div>
      </div>
    </Pop>}
  </div>;
}

        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:6}}>
          <span style={{background:"#f0f4ff",color:C.b2,borderRadius:8,padding:"3px 10px",fontSize:12,fontWeight:600}}>📊 {s.vol}/session</span>

        </div>

    ))}

    <div style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:1,marginTop:8}}>SESSION STRUCTURE</div>
    <Box style={{padding:16}}>
      {[["1. Warm Up","400–800m easy, mixed strokes + drills","#16a34a"],["2. Pre Set","Activation, kick, pull, build (400–1000m)","#0055ff"],["3. Main Set","Primary training stimulus (zone-specific)","#d97706"],["4. Sprint/Skill","Speed work or technique (optional)","#dc2626"],["5. Swim Down","200–600m easy aerobic recovery","#059669"]].map(([t,d,col])=>(
        <div key={t} style={{display:"flex",gap:12,padding:"8px 0",borderBottom:`1px solid ${C.border}`}}>

        </div>
      ))}
    </Box>

    <div style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:1,marginTop:8}}>METHODOLOGY PRINCIPLES</div>
    <Box style={{padding:16}}>
      <div style={{fontSize:13,lineHeight:1.8,color:C.text}}>
        <p style={{marginBottom:10}}><b style={{color:C.b2}}>Maglischo (6-zone):</b> Train each energy system specifically — endurance (EN1-3), sprint (SP1-3). Match intensity, rest and volume precisely to the target adaptation.</p>
        <p style={{marginBottom:10}}><b style={{color:C.parent}}>Olbrecht:</b> Balance aerobic capacity (engine size) with aerobic power and anaerobic capacity. Periodise to peak at the right time without burning the system.</p>
        <p><b style={{color:C.ok}}>Vortex approach:</b> Build a deep aerobic base in younger squads, layer threshold and VO2 in mid squads, add race-specific sprint and lactate work in senior squads. Technique first, always.</p>
      </div>
    </Box>
  </div>;
}

// ── HY-TEK MODAL ──────────────────────────────────────────────
function HytekModal({comps,swimmers,onEntries,onResults,onClose}){
  const [step,setStep]=useState("upload");
  const [cid,setCid]=useState(comps[0]?.id||"");
  const [parsed,setParsed]=useState(null);
  const [mapped,setMapped]=useState([]);
  const [mode,setMode]=useState("entries");
  const [err,setErr]=useState("");
  const [logs,setLogs]=useState([]);
  const [paste,setPaste]=useState("");

  const match=rows=>rows.map(r=>{
    const n=r.swimmerName.toLowerCase().replace(/[,.]/g," ").trim();
    const parts=n.split(/\s+/).filter(p=>p.length>1);
    const sw=swimmers.find(s=>{const h=s.name.toLowerCase();return h===n||(parts.length>=2&&parts.every(p=>h.includes(p)))||parts.some(p=>p.length>3&&h.includes(p));});
    return{...r,swimmerId:sw?.id||"",swimmerName:sw?.name||r.swimmerName,group:sw?.group||r.team||"",matched:!!sw};
  });

  const process=(text,name)=>{
    setErr("");setLogs([]);
    const p=parseHytek(text);setLogs(p.logs);
    if(!p.entries.length){setErr(`No records found in "${name}".`);return;}
    setParsed(p);const m=p.isResults?"results":"entries";setMode(m);
    setMapped(match(m==="results"?p.results:p.entries));setStep("preview");
  };

  const handleFile=async e=>{
    const file=e.target.files[0];if(!file)return;e.target.value="";setErr("");
    try{const text=await new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target?.result||"");r.onerror=rej;r.readAsText(file,"latin1");});process(text,file.name);}
    catch(e2){setErr("Read error: "+e2.message);}
  };

  const doImport=()=>{
    const ts=Date.now();
    if(mode==="entries"){onEntries(mapped.map((r,i)=>({id:`en${ts}_${i}`,compId:cid,swimmerId:r.swimmerId||"",swimmerName:r.swimmerName,group:r.group||"",event:r.event,seedTime:r.seedTime||"NT",heat:+r.heat||"",lane:+r.lane||"",age:r.age||"",gender:r.gender||"",team:r.team||""})),cid);}
    else{onResults(mapped.filter(r=>r.event&&r.swimmerName).map((r,i)=>({id:`re${ts}_${i}`,compId:cid,swimmerId:r.swimmerId||"",swimmerName:r.swimmerName,group:r.group||"",event:r.event,time:r.dq?"DQ":r.finalTime||"NT",place:+r.place||"",heat:+r.heat||"",lane:+r.lane||"",age:r.age||"",gender:r.gender||"",team:r.team||"",dq:!!r.dq})),cid);}
    setStep("done");
  };

  const stepBar=["upload","preview","done"];
  return <Pop title="📥 Import HY-TEK" onClose={onClose} wide>
    <div style={{display:"flex",gap:4,marginBottom:20}}>
      {[["upload","1. Upload"],["preview","2. Preview"],["done","3. Done"]].map(([id,lb])=>(
        <div key={id} style={{flex:1,textAlign:"center",padding:"8px",borderRadius:10,background:step===id?C.b2:"#f0f4ff",color:step===id?"#fff":C.muted,fontWeight:step===id?700:500,fontSize:12}}>{lb}</div>
      ))}
    </div>

    {step==="upload"&&<div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div><div style={{fontSize:11,color:C.muted,fontWeight:600,marginBottom:6}}>COMPETITION</div><select value={cid} onChange={e=>setCid(e.target.value)} style={IS}>{comps.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select></div>
      <div style={{background:"#f8faff",border:`2px dashed ${C.border}`,borderRadius:14,padding:24,textAlign:"center"}}>
        <div style={{fontSize:32,marginBottom:8}}>📁</div>
        <div style={{fontWeight:700,color:C.text,marginBottom:4}}>Upload HY-TEK File</div>
        <div style={{fontSize:11,color:C.muted,marginBottom:14}}>.cl2 · .hy3 · .sd3 · .txt</div>
        <input type="file" accept=".cl2,.hy3,.sd3,.hy,.txt,.hy2" onChange={handleFile} style={{color:C.text,fontSize:13,cursor:"pointer"}}/>
      </div>
      {logs.length>0&&<div style={{background:"#f8faff",border:`1px solid ${C.border}`,borderRadius:10,padding:12}}>{logs.map((l,i)=><div key={i} style={{fontSize:11,fontFamily:"monospace",color:l.startsWith("⚠")?C.err:C.muted,lineHeight:1.8}}>{l}</div>)}</div>}
      <div style={{borderTop:`1px solid ${C.border}`,paddingTop:14}}>
        <div style={{fontWeight:700,fontSize:12,marginBottom:6,color:C.text}}>Or paste file content</div>
        <textarea value={paste} onChange={e=>setPaste(e.target.value)} rows={4} placeholder="Paste .cl2 content here…" style={{...IS,fontFamily:"monospace",fontSize:11,resize:"vertical"}}/>
        <button onClick={()=>paste.trim()&&process(paste,"pasted")} style={{...mkBtn(),width:"100%",marginTop:8,borderRadius:10,padding:"11px"}}>🔍 Parse Content</button>
      </div>
      {err&&<div style={{color:C.err,fontSize:12,background:C.errBg,border:`1px solid ${C.err}30`,borderRadius:10,padding:12}}>{err}</div>}
    </div>}

    {step==="preview"&&parsed&&<div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"flex",gap:8}}>
        <div onClick={()=>{setMode("entries");setMapped(match(parsed.entries));}} style={{flex:1,textAlign:"center",padding:10,borderRadius:10,cursor:"pointer",background:mode==="entries"?C.b2:"#f0f4ff",border:`1.5px solid ${mode==="entries"?C.b2:C.border}`,fontSize:12,fontWeight:mode==="entries"?700:500,color:mode==="entries"?"#fff":C.text}}>📋 Entries ({parsed.entries.length})</div>
        <div onClick={()=>{if(parsed.results.length){setMode("results");setMapped(match(parsed.results));}}} style={{flex:1,textAlign:"center",padding:10,borderRadius:10,cursor:parsed.results.length?"pointer":"not-allowed",background:mode==="results"?"#059669":"#f0f4ff",border:`1.5px solid ${mode==="results"?"#059669":C.border}`,fontSize:12,fontWeight:mode==="results"?700:500,color:mode==="results"?"#fff":C.text,opacity:parsed.results.length?1:.4}}>🏆 Results ({parsed.results.length})</div>
      </div>
      {parsed.meta?.meetName&&<div style={{background:"#f0f4ff",borderRadius:10,padding:"8px 14px",fontSize:12,color:C.b2,fontWeight:600}}>📍 {parsed.meta.meetName}</div>}
      <div style={{fontSize:12,color:C.muted}}>Found <b style={{color:C.text}}>{[...new Set(mapped.map(r=>r.swimmerName))].length} swimmers</b> · <b style={{color:C.text}}>{mapped.length} events</b></div>
      <div style={{maxHeight:300,overflowY:"auto",display:"flex",flexDirection:"column",gap:6}}>
        {[...new Set(mapped.map(r=>r.swimmerName))].map(name=>{
          const rows=mapped.filter(r=>r.swimmerName===name);
          const isMatch=rows[0]?.matched;
          return <div key={name} style={{background:isMatch?C.okBg:"#f0f4ff",border:`1px solid ${isMatch?"#059669"+"30":C.border}`,borderRadius:10,padding:"10px 12px"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <div style={{fontWeight:700,fontSize:13,color:C.text}}>{name}</div>
              <span style={{fontSize:11,color:isMatch?C.ok:C.b2,fontWeight:700}}>{isMatch?"✓ exists":"🆕 new account"}</span>
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
              {rows.map((r,i)=><span key={i} style={{background:"#fff",border:`1px solid ${C.border}`,borderRadius:8,padding:"3px 8px",fontSize:11,fontFamily:"monospace",color:r.dq?C.err:C.b2}}>{r.event}: {mode==="results"?(r.dq?"DQ":r.finalTime||"NT"):r.seedTime||"NT"}</span>)}
            </div>
          </div>;
        })}
      </div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>setStep("upload")} style={{...mkBtn("#6b7280",true),flex:1}}>← Back</button>
        <button onClick={doImport} style={{...mkBtn(mode==="results"?"#059669":C.b2),flex:2}}>✓ Import All</button>
      </div>
    </div>}

    {step==="done"&&<div style={{textAlign:"center",padding:"32px 0"}}>
      <div style={{fontSize:56,marginBottom:16}}>{mode==="entries"?"📋":"🏆"}</div>
      <div style={{fontSize:20,fontWeight:800,color:C.text,marginBottom:6}}>Import Complete!</div>
      <div style={{fontSize:13,color:C.muted,marginBottom:24}}>Swimmer accounts created and results saved.</div>
      <button onClick={onClose} style={{...mkBtn(),background:C.grad,padding:"12px 40px",borderRadius:12}}>Done</button>
    </div>}
  </Pop>;
}

// ── ATTENDANCE ─────────────────────────────────────────────────
function Attendance({group,swimmers,coachId,attend,onSave}){
  const mySw=swimmers.filter(s=>s.group===group);
  const today=new Date().toISOString().slice(0,10);
  const [date,setDate]=useState(today);
  const [pres,setPres]=useState(()=>new Set(mySw.map(s=>s.id)));
  const [note,setNote]=useState("");
  const sessions=attend.filter(a=>a.group===group);
  useEffect(()=>{const ex=attend.find(a=>a.date===date&&a.group===group);if(ex){setPres(new Set(ex.present));setNote(ex.note||"");}else{setPres(new Set(mySw.map(s=>s.id)));setNote("");};},[date,attend.length]);
  const tog=id=>setPres(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;});
  return <div style={{display:"flex",flexDirection:"column",gap:14}}>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
      {[[sessions.length,"Sessions",C.b2],[`${pres.size}/${mySw.length}`,"Today",C.ok],[`~${sessions.length*5}km`,"Total KM",C.warn]].map(([v,l,col])=>(
        <Box key={l} style={{textAlign:"center",padding:14}}><div style={{fontSize:20,fontWeight:800,color:col}}>{v}</div><div style={{fontSize:10,color:C.muted,marginTop:3,fontWeight:600}}>{l}</div></Box>
      ))}
    </div>
    <Box style={{padding:18}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{fontWeight:700,fontSize:15}}>Mark Attendance</div>
        <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{...IS,width:160,padding:"7px 10px",fontSize:12}}/>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        <button onClick={()=>setPres(new Set(mySw.map(s=>s.id)))} style={{...mkBtn(C.ok),padding:"7px 14px",fontSize:12,borderRadius:10,flex:1,boxShadow:"none"}}>✓ All Present</button>
        <button onClick={()=>setPres(new Set())} style={{...mkBtn(C.err),padding:"7px 14px",fontSize:12,borderRadius:10,flex:1,boxShadow:"none"}}>✕ All Absent</button>

// ══════════════════════════════════════════════════════════════
// VORTEX INSIGHTS ENGINE  ·  closes the Mako360 / MakoVision gap
// Pure-SVG charts (zero dependencies) + connected analytics.
// ══════════════════════════════════════════════════════════════
const ZONE_W  ={"End 1":1,"End 2":2,"End 3":3.2,"SP 1":4.2,"SP 2":5,"SP 3":6};
const ZONE_COL={"End 1":"#16a34a","End 2":"#0055ff","End 3":"#7c3aed","SP 1":"#d97706","SP 2":"#ea580c","SP 3":"#dc2626"};

function planLoad(p){
  const d=parseFloat(String(p.dist||"").replace(/[^\d.]/g,""))||0;
  const w=ZONE_W[p.goal]||2;
  return d?Math.round(d*w/100):Math.round(28*w);
}
function secToTime(s){
  if(!isFinite(s))return "–";
  const m=Math.floor(s/60), r=s-m*60;
  return m?`${m}:${r.toFixed(2).padStart(5,"0")}`:r.toFixed(2);
}
function weekMonday(dstr){
  const dt=new Date(dstr+"T00:00:00"); if(isNaN(dt))return dstr;
  const off=(dt.getDay()+6)%7; dt.setDate(dt.getDate()-off);
  return dt.toISOString().slice(0,10);
}
const dShort=d=>{try{const x=new Date(d+"T00:00:00");return `${x.getDate()}/${x.getMonth()+1}`;}catch(e){return d;}};

// ── LINE CHART ─────────────────────────────────────────────────
function LineChart({data,color=C.b2,goodDir=null,fmt}){
  const pts=data.filter(d=>d.value!=null&&isFinite(d.value));
  if(pts.length<1)return <div style={{padding:"26px 0",textAlign:"center",color:C.muted,fontSize:12}}>Not enough data yet.</div>;
  const W=300,H=118,PL=8,PR=10,PT=16,PB=20;
  const vals=pts.map(p=>p.value); let min=Math.min(...vals),max=Math.max(...vals);
  if(min===max){min-=1;max+=1;} const pad=(max-min)*0.18; min-=pad; max+=pad;
  const x=i=>PL+(pts.length===1?(W-PL-PR)/2:i*(W-PL-PR)/(pts.length-1));
  const y=v=>PT+(1-(v-min)/(max-min))*(H-PT-PB);
  const line=pts.map((p,i)=>`${i?"L":"M"}${x(i).toFixed(1)} ${y(p.value).toFixed(1)}`).join(" ");
  const area=`${line} L${x(pts.length-1).toFixed(1)} ${H-PB} L${x(0).toFixed(1)} ${H-PB} Z`;
  const gid="g"+Math.random().toString(36).slice(2,7);
  const first=pts[0].value,last=pts[pts.length-1].value;
  const improved=goodDir==="up"?last>=first:goodDir==="down"?last<=first:null;
  const endCol=improved==null?color:(improved?C.ok:C.err);
  return <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto",display:"block"}}>
    <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.20"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
    {[0,.5,1].map(g=><line key={g} x1={PL} x2={W-PR} y1={PT+g*(H-PT-PB)} y2={PT+g*(H-PT-PB)} stroke="#eef1f7" strokeWidth="1"/>)}
    <path d={area} fill={`url(#${gid})`}/>
    <path d={line} fill="none" stroke={color} strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round"/>
    {pts.map((p,i)=><g key={i}>
      <circle cx={x(i)} cy={y(p.value)} r="3.1" fill="#fff" stroke={color} strokeWidth="2"/>
      {(i===0||i===pts.length-1||pts.length<=6)&&<text x={x(i)} y={H-6} fontSize="8" fill={C.muted} textAnchor={i===0?"start":i===pts.length-1?"end":"middle"}>{p.label}</text>}
    </g>)}
    <text x={x(0)} y={Math.max(y(first)-6,10)} fontSize="8.5" fill={C.muted}>{fmt?fmt(first):first}</text>
    <text x={W-PR} y={Math.max(y(last)-6,10)} fontSize="9" fontWeight="700" fill={endCol} textAnchor="end">{fmt?fmt(last):last}</text>
  </svg>;
}

// ── BAR CHART ──────────────────────────────────────────────────
function BarChart({data,color=C.b2}){
  const pts=data.filter(d=>d.value!=null);
  if(!pts.length)return <div style={{padding:"26px 0",textAlign:"center",color:C.muted,fontSize:12}}>No data yet.</div>;
  const W=300,H=118,PT=16,PB=20,PL=6,PR=6;
  const max=Math.max(...pts.map(p=>p.value),1);
  const bw=(W-PL-PR)/pts.length;
  return <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto",display:"block"}}>
    {pts.map((p,i)=>{const bh=(p.value/max)*(H-PT-PB);const bx=PL+i*bw+bw*0.16;const bwid=bw*0.68;
      return <g key={i}>
        <rect x={bx} y={H-PB-bh} width={bwid} height={Math.max(bh,1)} rx="3" fill={color} opacity={i===pts.length-1?1:0.72}/>
        <text x={bx+bwid/2} y={H-PB-bh-4} fontSize="8" fill={C.muted} textAnchor="middle">{p.value}</text>
        <text x={bx+bwid/2} y={H-6} fontSize="7.5" fill={C.muted} textAnchor="middle">{p.label}</text>
      </g>;})}
  </svg>;
}

// ── PROGRESS RING ──────────────────────────────────────────────
function Ring({pct,color=C.b2,size=78,label,sub}){
  const p=Math.max(0,Math.min(1,pct));
  const r=(size-10)/2,c=2*Math.PI*r,off=c*(1-p);
  return <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#eef1f7" strokeWidth="8"/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="8" strokeLinecap="round" strokeDasharray={c} strokeDashoffset={off} transform={`rotate(-90 ${size/2} ${size/2})`}/>
      <text x={size/2} y={size/2+5} fontSize="16" fontWeight="800" fill={C.text} textAnchor="middle">{Math.round(p*100)}%</text>
    </svg>
    {label&&<div style={{fontSize:12,fontWeight:700,textAlign:"center"}}>{label}</div>}
    {sub&&<div style={{fontSize:10,color:C.muted,textAlign:"center"}}>{sub}</div>}
  </div>;
}

// ── ZONE DISTRIBUTION BAR ──────────────────────────────────────
function ZoneDist({plans}){
  const tot={}; let sum=0;
  plans.forEach(p=>{if(!p.goal)return;const l=planLoad(p);tot[p.goal]=(tot[p.goal]||0)+l;sum+=l;});
  if(!sum)return <div style={{padding:"16px 0",textAlign:"center",color:C.muted,fontSize:12}}>Add plans with energy-zone goals to see distribution.</div>;
  return <div>
    <div style={{display:"flex",height:16,borderRadius:8,overflow:"hidden",border:`1px solid ${C.border}`}}>
      {GOALS.map(g=>tot[g]?<div key={g} title={`${g} ${Math.round(tot[g]/sum*100)}%`} style={{width:`${tot[g]/sum*100}%`,background:ZONE_COL[g]}}/>:null)}
    </div>
    <div style={{display:"flex",flexWrap:"wrap",gap:10,marginTop:10}}>
      {GOALS.map(g=>tot[g]?<span key={g} style={{fontSize:11,color:C.muted,display:"flex",alignItems:"center",gap:5}}><span style={{width:9,height:9,borderRadius:2,background:ZONE_COL[g],display:"inline-block"}}/>{g} · {Math.round(tot[g]/sum*100)}%</span>:null)}
    </div>
  </div>;
}

// ── INSIGHTS DASHBOARD (Mako360-style, connected) ──────────────
function Insights({swimmers,results,plans,attend,tracking,comps,group}){
  const mySw=group?swimmers.filter(s=>s.group===group):swimmers;
  const [selId,setSelId]=useState(mySw[0]?.id||"");
  const sw=swimmers.find(s=>s.id===selId)||mySw[0];
  const compDate={}; comps.forEach(c=>compDate[c.id]=c.date);

  // ---- group-level ----
  const gPlans=(group?plans.filter(p=>p.group===group):plans);
  const gAtt  =(group?attend.filter(a=>a.group===group):attend);
  const thisWk=weekMonday(new Date().toISOString().slice(0,10));
  const wkLoad=gPlans.filter(p=>weekMonday(p.date)===thisWk).reduce((s,p)=>s+planLoad(p),0);
  let pr=0,ab=0; gAtt.forEach(a=>{pr+=(a.present||[]).length;ab+=(a.absent||[]).length;});
  const attRate=pr+ab?pr/(pr+ab):0;
  const recentTr=tracking.filter(t=>mySw.some(s=>s.id===t.swimmerId));
  const wellVals=recentTr.map(t=>+t.wellness).filter(isFinite);
  const avgWell=wellVals.length?(wellVals.reduce((a,b)=>a+b,0)/wellVals.length):0;

  // weekly load series (last 8 wks)
  const byWk={}; gPlans.forEach(p=>{const w=weekMonday(p.date);byWk[w]=(byWk[w]||0)+planLoad(p);});
  const wkSeries=Object.keys(byWk).sort().slice(-8).map(w=>({label:dShort(w),value:byWk[w]}));

  // ---- swimmer-level ----
  const swTr=tracking.filter(t=>t.swimmerId===selId).sort((a,b)=>a.date.localeCompare(b.date));
  const swRes=results.filter(r=>r.swimmerId===selId||r.swimmerName?.toLowerCase()===sw?.name?.toLowerCase());
  const eventsWithData=STROKES.filter(ev=>swRes.filter(r=>r.event===ev&&!r.dq&&isFinite(toSec(r.time))).length>=1);
  const [ev,setEv]=useState(eventsWithData[0]||"");
  const curEv=eventsWithData.includes(ev)?ev:(eventsWithData[0]||"");
  const evSeries=swRes.filter(r=>r.event===curEv&&!r.dq&&isFinite(toSec(r.time)))
    .map(r=>({date:compDate[r.compId]||"",value:toSec(r.time)}))
    .filter(r=>r.date).sort((a,b)=>a.date.localeCompare(b.date))
    .map(r=>({label:dShort(r.date),value:r.value}));

  const trSeries=k=>swTr.map(t=>({label:dShort(t.date),value:+t[k]})).filter(d=>isFinite(d.value));
  // per-swimmer attendance
  let sp=0,sa=0; gAtt.forEach(a=>{if((a.present||[]).includes(selId))sp++;else if((a.absent||[]).includes(selId))sa++;});
  const swAtt=sp+sa?sp/(sp+sa):0;

  return <div style={{display:"flex",flexDirection:"column",gap:14}}>
    <div style={{display:"flex",alignItems:"center",gap:10}}>
      <div style={{width:40,height:40,borderRadius:12,background:C.b2+"15",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>📈</div>
      <div><div style={{fontSize:17,fontWeight:800}}>Insights</div><div style={{fontSize:11,color:C.muted}}>Connected performance dashboard{group?` · ${group}`:""}</div></div>
    </div>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:10}}>
      <Kpi val={mySw.length} label="Swimmers" col={C.b2}/>
      <Kpi val={wkLoad} label="Load / wk" col={C.warn} sub="load units"/>
      <Kpi val={avgWell?avgWell.toFixed(1):"–"} label="Wellness" col={C.ok} sub="/ 5"/>
      <Kpi val={(attRate*100).toFixed(0)+"%"} label="Attendance" col={C.parent}/>
    </div>

    <ChartCard title="Weekly Training Load" tag="8 weeks" tagCol={C.warn}>
      <BarChart data={wkSeries} color={C.warn}/>
      <div style={{fontSize:11,color:C.muted,marginTop:8,lineHeight:1.5}}>Auto-computed from each plan's distance × energy-zone intensity — the same load logic that flags over-reaching before it becomes injury.</div>
    </ChartCard>

    <ChartCard title="Energy-System Distribution" tag="all plans" tagCol={C.b2}>
      <ZoneDist plans={gPlans}/>
    </ChartCard>

    <div style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:1,marginTop:4}}>INDIVIDUAL ATHLETE</div>
    <select value={selId} onChange={e=>setSelId(e.target.value)} style={IS}>{mySw.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select>

    <ChartCard title="Personal Best Progression" tag={eventsWithData.length?`${eventsWithData.length} events`:"no results"} tagCol={C.b2}>
      {eventsWithData.length>0?<>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
          {eventsWithData.map(e=><div key={e} onClick={()=>setEv(e)} style={{background:curEv===e?C.b2:"#f0f4ff",color:curEv===e?"#fff":C.b2,border:`1px solid ${curEv===e?C.b2:C.border}`,borderRadius:16,padding:"5px 12px",fontSize:11,fontWeight:700,cursor:"pointer"}}>{e}</div>)}
        </div>
        <LineChart data={evSeries} color={C.b2} goodDir="down" fmt={secToTime}/>
        <div style={{fontSize:11,color:C.muted,marginTop:8}}>Lower is faster. Green end-label = improving. Times pulled straight from imported meet results.</div>
      </>:<div style={{padding:"20px 0",textAlign:"center",color:C.muted,fontSize:12}}>No timed results imported for this swimmer yet.</div>}
    </ChartCard>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
      <ChartCard title="Wellness" tag="1–5" tagCol={C.ok}><LineChart data={trSeries("wellness")} color={C.ok} goodDir="up"/></ChartCard>
      <ChartCard title="Sleep (h)" tag="hrs" tagCol={C.parent}><LineChart data={trSeries("sleep")} color={C.parent} goodDir="up"/></ChartCard>
      <ChartCard title="Resting HR" tag="bpm" tagCol={C.err}><LineChart data={trSeries("restHR")} color={C.err} goodDir="down"/></ChartCard>
      <ChartCard title="Weight (kg)" tag="kg" tagCol={C.b2}><LineChart data={trSeries("weight")} color={C.b2}/></ChartCard>
    </div>

    <ChartCard title="Attendance Consistency">
      <div style={{display:"flex",justifyContent:"space-around",alignItems:"center",padding:"6px 0"}}>
        <Ring pct={swAtt} color={C.parent} label={sw?.name?.split(" ")[0]||"Athlete"} sub={`${sp}/${sp+sa} sessions`}/>
        <Ring pct={attRate} color={C.b2} label="Squad" sub={`${(attRate*100).toFixed(0)}% overall`}/>
      </div>
    </ChartCard>
  </div>;
}

// ── SEASON GOALS (target times + progress) ─────────────────────
function Goals({swimmers,setSw,results,group}){
  const mySw=group?swimmers.filter(s=>s.group===group):swimmers;
  const [selId,setSelId]=useState(mySw[0]?.id||"");
  const sw=swimmers.find(s=>s.id===selId)||mySw[0];
  const [addEv,setAddEv]=useState(STROKES[0]);
  const [addT,setAddT]=useState("");
  if(!sw)return <Box style={{textAlign:"center",padding:40,color:C.muted}}>No swimmers in this group yet.</Box>;
  const goals=sw.goals||{};
  const setGoal=(ev,t)=>setSw(swimmers.map(s=>s.id===sw.id?{...s,goals:{...(s.goals||{}),[ev]:t}}:s));
  const delGoal=ev=>setSw(swimmers.map(s=>{if(s.id!==sw.id)return s;const g={...(s.goals||{})};delete g[ev];return {...s,goals:g};}));

  return <div style={{display:"flex",flexDirection:"column",gap:14}}>
    <div style={{display:"flex",alignItems:"center",gap:10}}>
      <div style={{width:40,height:40,borderRadius:12,background:"#0891b215",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>🎯</div>
      <div><div style={{fontSize:17,fontWeight:800}}>Season Goals</div><div style={{fontSize:11,color:C.muted}}>Target times & live progress vs PB</div></div>
    </div>
    <select value={selId} onChange={e=>setSelId(e.target.value)} style={IS}>{mySw.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select>

    <Box style={{padding:16}}>
      <div style={{fontWeight:700,fontSize:13,marginBottom:10}}>Set a target</div>
      <div style={{display:"flex",gap:8}}>
        <select value={addEv} onChange={e=>setAddEv(e.target.value)} style={{...IS,flex:2}}>{STROKES.map(e=><option key={e}>{e}</option>)}</select>
        <input value={addT} onChange={e=>setAddT(e.target.value)} placeholder="e.g. 26.0 or 1:02.5" style={{...IS,flex:1,fontFamily:"monospace"}}/>
        <button onClick={()=>{if(addT.trim()){setGoal(addEv,addT.trim());setAddT("");}}} style={{...mkBtn(),padding:"10px 16px",borderRadius:10}}>Set</button>
      </div>
    </Box>

    {Object.keys(goals).length===0&&<Box style={{textAlign:"center",padding:34,color:C.muted}}><div style={{fontSize:30,marginBottom:8}}>🎯</div><div style={{fontWeight:700}}>No goals set</div><div style={{fontSize:12,marginTop:4}}>Add a target time above to start tracking.</div></Box>}

    {Object.entries(goals).map(([ev,gt])=>{
      const gSec=toSec(gt);
      const pb=(sw.pbs||{})[ev];
      const pbSec=pb?toSec(pb):Infinity;
      const achieved=isFinite(pbSec)&&pbSec<=gSec;
      const pct=!isFinite(pbSec)?0:achieved?1:gSec/pbSec;
      const gap=isFinite(pbSec)&&!achieved?(pbSec-gSec):0;
      return <Box key={ev} style={{padding:16,borderLeft:`4px solid ${achieved?C.ok:C.b2}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div><div style={{fontWeight:700,fontSize:14}}>{ev}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:2}}>PB {pb||"—"} · Target <b style={{color:C.b2,fontFamily:"monospace"}}>{gt}</b></div></div>
          {achieved?<Tag label="✓ Achieved" col={C.ok}/>:isFinite(pbSec)?<Tag label={`-${gap.toFixed(2)}s to go`} col={C.warn}/>:<Tag label="No PB yet" col={C.muted}/>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:16}}>
          <Ring pct={pct} color={achieved?C.ok:C.b2} size={64}/>
          <div style={{flex:1,fontSize:12,color:C.muted,lineHeight:1.6}}>
            {achieved?"Goal reached — set a faster target to keep the athlete climbing.":isFinite(pbSec)?`${(pct*100).toFixed(0)}% of the way from current PB to target.`:"Import or add a PB for this event to track progress."}
          </div>
          <span onClick={()=>delGoal(ev)} style={{fontSize:11,color:C.err,cursor:"pointer"}}>Remove</span>
        </div>
      </Box>;
    })}
  </div>;
}

// VORTEX PRO MODULES — Boards, Video Analysis, Lounge social feed
// Maps to MakoBoards / MakoVision / Coaches Lounge.

const EXTRA_FIELDS=[
  {k:"sr",label:"Stroke Rate",unit:"spm"},{k:"sc",label:"Stroke Count",unit:""},
  {k:"hr",label:"Heart Rate",unit:"bpm"},{k:"rpe",label:"RPE",unit:"/10"},
];
const distOf=ev=>{const m=String(ev||"").match(/(\d+)/);return m?+m[1]:0;};
const timeAgo=ts=>{const s=(Date.now()-ts)/1000;if(s<60)return"just now";if(s<3600)return Math.floor(s/60)+"m ago";if(s<86400)return Math.floor(s/3600)+"h ago";return Math.floor(s/86400)+"d ago";};
const ytId=u=>{const m=String(u).match(/(?:youtu\.be\/|[?&]v=|embed\/|shorts\/)([\w-]{11})/);return m?m[1]:null;};
const vimeoId=u=>{const m=String(u).match(/vimeo\.com\/(\d+)/);return m?m[1]:null;};

function Media({url,rounded=true}){
  if(!url)return null;
  const st={width:"100%",borderRadius:rounded?12:0,display:"block",background:"#000"};
  const yt=ytId(url); if(yt)return <div style={{position:"relative",paddingBottom:"56.25%",height:0,borderRadius:12,overflow:"hidden"}}><iframe src={`https://www.youtube.com/embed/${yt}`} style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",border:0}} allowFullScreen title="video"/></div>;
  const vm=vimeoId(url); if(vm)return <div style={{position:"relative",paddingBottom:"56.25%",height:0,borderRadius:12,overflow:"hidden"}}><iframe src={`https://player.vimeo.com/video/${vm}`} style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",border:0}} allowFullScreen title="video"/></div>;
  if(url.startsWith("blob:")||/\.(mp4|webm|mov|m4v)(\?|#|$)/i.test(url))return <video src={url} controls playsInline style={{...st,maxHeight:360}}/>;
  if(/\.(jpe?g|png|gif|webp|avif)(\?|#|$)/i.test(url))return <img src={url} alt="" style={{...st,maxHeight:360,objectFit:"cover"}}/>;
  return <a href={url} target="_blank" rel="noreferrer" style={{color:C.b2,fontSize:12,wordBreak:"break-all"}}>{url}</a>;
}

// ── MAKOBOARDS: test sets + leaderboards ───────────────────────

  const [nm,setNm]=useState(""),[crs,setCrs]=useState("LCM"),[dst,setDst]=useState("50"),[flds,setFlds]=useState({splits:false,sr:false,sc:false,hr:false,rpe:false});
  const addBoard=()=>{if(!nm.trim())return;const b={id:uid(),name:nm.trim(),course:crs,dist:dst,fields:flds};setBd([b,...boards]);setNm("");setFlds({splits:false,sr:false,sc:false,hr:false,rpe:false});setCreating(false);setSel(b.id);};

  // entry form state
  const [eSw,setESw]=useState(mySw[0]?.id||""),[eVal,setEVal]=useState(""),[eReps,setEReps]=useState(""),[eEx,setEEx]=useState({});
  const saveResult=()=>{
    if(!eVal.trim()||!eSw)return;
    const reps=eReps.split(",").map(x=>toSec(x.trim())).filter(isFinite);
    setBr([{id:uid(),boardId:board.id,swimmerId:eSw,value:eVal.trim(),date:new Date().toISOString().slice(0,10),reps,extra:{...eEx}},...bResults]);
    setEVal("");setEReps("");setEEx({});

  if(board){

    const dist=+board.dist||0;
    return <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div onClick={()=>setSel(null)} style={{fontSize:13,color:C.b2,cursor:"pointer",fontWeight:700}}>← All boards</div>
      <div><div style={{fontSize:18,fontWeight:800}}>{board.name}</div><div style={{fontSize:11,color:C.muted}}>{board.course} · {board.dist}m · {rows.length} entries</div></div>
      <div style={{display:"flex",gap:8}}>
        {[["rank","🏆 Rankings"],["entry","➕ Record"]].map(([k,l])=><div key={k} onClick={()=>setTab(k)} style={{flex:1,textAlign:"center",padding:"9px 0",borderRadius:10,cursor:"pointer",fontWeight:700,fontSize:13,background:tab===k?C.b2:"#f0f4ff",color:tab===k?"#fff":C.b2}}>{l}</div>)}
      </div>

      {tab==="rank"&&(rows.length?rows.map((r,i)=>{
        const sr=r.reps&&r.reps.length?r.reps:null;
        return <Box key={r.id} style={{padding:14,borderLeft:`4px solid ${i<3?["#f59e0b","#94a3b8","#b45309"][i]:C.border}`}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{fontSize:16,fontWeight:800,width:28,textAlign:"center"}}>{medal(i)}</div>
            <div style={{flex:1}}><div style={{fontWeight:700,fontSize:14}}>{nm2(r.swimmerId)}</div><div style={{fontSize:10,color:C.muted}}>{fmtD(r.date)}</div></div>
            <div style={{fontFamily:"monospace",fontWeight:800,fontSize:16,color:C.b2}}>{r.value}</div>
          </div>
          {(r.extra&&Object.keys(r.extra).some(k=>r.extra[k]))&&<div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:8}}>
            {EXTRA_FIELDS.map(f=>r.extra[f.k]?<span key={f.k} style={{fontSize:10,background:"#f0f4ff",color:C.b2,borderRadius:12,padding:"3px 9px",fontWeight:600}}>{f.label}: {r.extra[f.k]}{f.unit}</span>:null)}
          </div>}
          {sr&&<div style={{marginTop:10}}><div style={{fontSize:10,color:C.muted,fontWeight:700,marginBottom:4}}>SPLIT BREAKDOWN</div>
            <BarChart data={sr.map((v,ix)=>({label:"R"+(ix+1),value:+v.toFixed(2)}))} color={C.parent}/>
            {dist>0&&<div style={{fontSize:10,color:C.muted,marginTop:4}}>Avg velocity {(dist/(sr.reduce((a,b)=>a+b,0)/sr.length)).toFixed(2)} m/s</div>}
          </div>}
          <div onClick={()=>setBr(bResults.filter(x=>x.id!==r.id))} style={{fontSize:10,color:C.err,cursor:"pointer",marginTop:8,textAlign:"right"}}>Remove</div>
        </Box>;
      }):<Box style={{textAlign:"center",padding:30,color:C.muted}}>No entries yet — record one under the Record tab.</Box>)}

      {tab==="entry"&&<Box style={{padding:16,display:"flex",flexDirection:"column",gap:12}}>
        <div><div style={LB}>Athlete</div><select value={eSw} onChange={e=>setESw(e.target.value)} style={IS}>{mySw.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select></div>
        <div><div style={LB}>Result time</div><input value={eVal} onChange={e=>setEVal(e.target.value)} placeholder="e.g. 1:38.21 or 24.55" style={{...IS,fontFamily:"monospace"}}/></div>
        {board.fields.splits&&<div><div style={LB}>Rep / lap splits (comma-separated)</div><input value={eReps} onChange={e=>setEReps(e.target.value)} placeholder="24.55, 24.22, 24.56, 24.88" style={{...IS,fontFamily:"monospace"}}/></div>}
        {EXTRA_FIELDS.filter(f=>board.fields[f.k]).map(f=><div key={f.k}><div style={LB}>{f.label} {f.unit&&`(${f.unit})`}</div><input value={eEx[f.k]||""} onChange={e=>setEEx({...eEx,[f.k]:e.target.value})} style={IS}/></div>)}
        <button onClick={saveResult} style={{...mkBtn(),marginTop:4}}>Save result</button>
      </Box>}
    </div>;
  }

  return <div style={{display:"flex",flexDirection:"column",gap:14}}>

      <div style={{flex:1}}><div style={{fontSize:17,fontWeight:800}}>Boards</div><div style={{fontSize:11,color:C.muted}}>Test-set leaderboards & custom metrics</div></div>
      <button onClick={()=>setCreating(!creating)} style={{...mkBtn(),padding:"9px 14px"}}>{creating?"✕":"+ Metric"}</button>
    </div>
    {creating&&<Box style={{padding:16,display:"flex",flexDirection:"column",gap:12}}>
      <div><div style={LB}>Metric name</div><input value={nm} onChange={e=>setNm(e.target.value)} placeholder="e.g. 4 × 50 @ 6:00, 25m Dive, 100 kick" style={IS}/></div>
      <div style={{display:"flex",gap:8}}>
        <div style={{flex:1}}><div style={LB}>Course</div><select value={crs} onChange={e=>setCrs(e.target.value)} style={IS}><option>LCM</option><option>SCM</option><option>SCY</option></select></div>
        <div style={{flex:1}}><div style={LB}>Distance (m)</div><input value={dst} onChange={e=>setDst(e.target.value)} style={IS}/></div>
      </div>
      <div><div style={LB}>Record with each result</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginTop:4}}>
          {[["splits","Splits"],...EXTRA_FIELDS.map(f=>[f.k,f.label])].map(([k,l])=>
            <div key={k} onClick={()=>setFlds({...flds,[k]:!flds[k]})} style={{cursor:"pointer",padding:"6px 12px",borderRadius:16,fontSize:12,fontWeight:600,border:`1.5px solid ${flds[k]?C.b2:C.border}`,background:flds[k]?C.b2:"#fff",color:flds[k]?"#fff":C.muted}}>{l}</div>)}
        </div>
      </div>
      <button onClick={addBoard} style={mkBtn()}>Create board</button>
    </Box>}
    {boards.length===0&&!creating&&<Box style={{textAlign:"center",padding:34,color:C.muted}}><div style={{fontSize:30}}>🏆</div><div style={{fontWeight:700,marginTop:6}}>No boards yet</div><div style={{fontSize:12,marginTop:3}}>Create a test set like "4 × 50 @ 6:00" and rank your squad.</div></Box>}
    {boards.map(b=>{const n=bResults.filter(r=>r.boardId===b.id).length;return <Box key={b.id} onClick={()=>{setSel(b.id);setTab("rank");}} style={{padding:14,display:"flex",alignItems:"center",gap:12,cursor:"pointer"}}>
      <div style={{width:38,height:38,borderRadius:10,background:"#f0f4ff",display:"flex",alignItems:"center",justifyContent:"center"}}>⏱</div>
      <div style={{flex:1}}><div style={{fontWeight:700,fontSize:14}}>{b.name}</div><div style={{fontSize:11,color:C.muted}}>{b.course} · {b.dist}m · {n} entries</div></div>
      <span style={{fontSize:18,color:C.muted}}>›</span>
    </Box>;})}
  </div>;
}

// ── VIDEO ANALYSIS (link-based, free) ──────────────────────────
function VideoLab({swimmers,videos,setVd,group}){
  const mySw=group?swimmers.filter(s=>s.group===group):swimmers;

    </Box>;})}
  </div>;
}

function VideoDetail({vid,swimmers,onBack,setVd,videos}){
  const [lap,setLap]=useState("");
  const nm=swimmers.find(s=>s.id===vid.swimmerId)?.name;
  const splits=vid.splits||[];
  const update=ns=>setVd(videos.map(v=>v.id===vid.id?{...v,splits:ns}:v));
  const addLap=()=>{const t=toSec(lap.trim());if(isFinite(t)){update([...splits,t]);setLap("");}};
  const laps=splits.map((cum,i)=>i===0?cum:cum-splits[i-1]); // per-lap from cumulative
  const dist=distOf(vid.event); const legs=splits.length||1; const legDist=dist?dist/legs:0;
  return <div style={{display:"flex",flexDirection:"column",gap:14}}>
    <div onClick={onBack} style={{fontSize:13,color:C.b2,cursor:"pointer",fontWeight:700}}>← Videos</div>
    <div><div style={{fontSize:17,fontWeight:800}}>{vid.title}</div><div style={{fontSize:11,color:C.muted}}>{nm?nm+" · ":""}{vid.event}</div></div>
    {vid.url?<Media url={vid.url}/>:<div style={{padding:"40px 0",textAlign:"center",background:"#111",color:"#888",borderRadius:12,fontSize:12}}>Local video can't be restored after reload. Paste a link to keep it.</div>}
    <Box style={{padding:16}}>
      <div style={{fontWeight:700,fontSize:14,marginBottom:10}}>Split / lap tagging</div>
      <div style={{display:"flex",gap:8}}>
        <input value={lap} onChange={e=>setLap(e.target.value)} placeholder="cumulative time at this wall, e.g. 26.4" style={{...IS,fontFamily:"monospace",flex:1}}/>
        <button onClick={addLap} style={{...mkBtn(C.parent),padding:"10px 16px",borderRadius:10}}>Add</button>
      </div>
      {splits.length>0&&<div style={{marginTop:14}}>
        <div style={{fontSize:10,color:C.muted,fontWeight:700,marginBottom:6}}>PER-LAP TIME</div>
        <BarChart data={laps.map((v,i)=>({label:legDist?`${Math.round(legDist*(i+1))}m`:"L"+(i+1),value:+v.toFixed(2)}))} color={C.parent}/>
        {legDist>0&&<div style={{marginTop:12}}>
          <div style={{fontSize:10,color:C.muted,fontWeight:700,marginBottom:6}}>VELOCITY (m/s)</div>
          <LineChart data={laps.map((v,i)=>({label:`${Math.round(legDist*(i+1))}m`,value:+(legDist/v).toFixed(2)}))} color={C.b2} goodDir="up"/>
        </div>}
        <div style={{display:"flex",justifyContent:"space-between",marginTop:10,fontSize:12}}>

    {lounge.length===0&&<Box style={{textAlign:"center",padding:30,color:C.muted}}>No posts yet — be the first to share a set!</Box>}
    {lounge.map(p=>{const liked=(p.likedBy||[]).includes(user.id);return <Box key={p.id} style={{padding:14}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
        <div style={{width:34,height:34,borderRadius:"50%",background:C.grad,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:13}}>{p.author[0]}</div>

      {p.img&&<div style={{marginBottom:8}}><Media url={p.img}/></div>}
      <div style={{display:"flex",alignItems:"center",gap:16,borderTop:`1px solid ${C.border}`,paddingTop:10,marginTop:4}}>

function LoungeComments({post,user,lounge,setLo}){

const ageToDob=a=>`${2026-(parseInt(a)||10)}-01-01`;
const AGE_GROUP=a=>{a=parseInt(a)||10;
  if(a<=6)return"Pre-Team";
  if(a<=8)return"Advanced B";
  if(a<=10)return"Advanced A";
  if(a<=12)return"Junior";
  if(a===13)return"Senior B";
  if(a===14)return"Senior A";
  if(a===15)return"Vortex B";
  if(a===16)return"Vortex A";
  return"Legend";};

function expandSquad(V){
  const swimmers=V.swimmers.map(s=>({id:s.i,name:s.n,dob:ageToDob(s.a),age:s.a,group:"",gender:s.g,phone:"",parentPhone:"",pbs:s.p||{},course:s.c||"LCM"}));
  const nameById={}; swimmers.forEach(s=>nameById[s.id]=s.name);
  const comps=(V.comps||[]).map(c=>({...c}));
  const results=(V.results||[]).map(r=>({id:uid(),compId:r.c,swimmerId:r.s,swimmerName:nameById[r.s]||"",event:r.e,time:r.d?"DQ":r.t,place:r.l||"",heat:"",lane:"",dq:!!r.d}));
  return {swimmers,comps,results};
}
function mergeGroups(newSw, oldSw){
  const prev={}; (oldSw||[]).forEach(s=>{if(s.group)prev[s.id]=s.group;});
  newSw.forEach(s=>{if(prev[s.id])s.group=prev[s.id];});
  return newSw;
}

// ── PDF PARSER (Hy-Tek Team Manager "Top Times / Results" export) ──
const _EV='(?:\\d{2,4}\\s+(?:Free|Back|Breast|Fly|IM)(?:\\s+Relay Lead Off)?|\\d{2,4}\\s+Medley Relay Lead Off)';
const _LINE=new RegExp('^(?:X\\s+)?(NS|DQ|\\d{1,2}:\\d{2}\\.\\d{2}[LS]?|\\d{1,2}\\.\\d{2}[LS]?)\\s+(?:L\\s+)?(?:(DQ)\\s+)?([FPS])\\s+(?:(-?[\\d.]+)\\s+)?('+_EV+')(?:\\s+(\\d{1,3}))?\\s+(\\d{1,2}\\/\\d{1,2}\\/\\d{4})\\s+(.+?)\\s*$');
const _HEAD=/^(.+?)\s+\((\d{1,2})\)\s+([GB])\s*$/;
const _isoD=d=>{const[mm,dd,yy]=d.split('/');return `${yy}-${String(+mm).padStart(2,'0')}-${String(+dd).padStart(2,'0')}`;};

function parseHytekText(lines){
  const swimmers=[]; const results=[]; const meetSet={}; let cur=null;
  const md5id=n=>'s_'+Math.abs([...n].reduce((h,c)=>((h<<5)-h+c.charCodeAt(0))|0,0)).toString(36);
  for(let raw of lines){
    let line=raw.replace(/\s+/g,' ').trim();
    if(!line||line.startsWith('Licensed To')||line.startsWith('Time P/F/S')||line.includes('SWIMMING CLUB'))continue;
    line=line.replace(/^XNS\b/,'NS');
    const lm=_LINE.exec(line);
    if(!lm){
      const h=_HEAD.exec(line);
      if(h){cur={id:md5id(h[1]+h[3]),name:h[1].trim(),age:+h[2],gender:h[3]==='B'?'M':'F',pbs:{},course:'LCM'};swimmers.push(cur);}
      continue;
    }
    if(!cur)continue;
    const [,time,dqf,flag,impr,ev,place,date,meet]=lm;
    if(ev.includes('Relay Lead Off'))continue;
    if(time==='NS')continue;
    const key=meet.trim()+'|'+_isoD(date); meetSet[key]=1;
    if(time==='DQ'||dqf){
      results.push({sid:cur.id,event:ev.trim(),time:'DQ',dq:true,place:place||'',meet:meet.trim(),date:_isoD(date)});
      continue;
    }
    const course=/S$/.test(time)?'SCM':'LCM'; const t=time.replace(/[LS]$/,'');
    results.push({sid:cur.id,event:ev.trim(),time:t,dq:false,course,place:place||'',meet:meet.trim(),date:_isoD(date)});
    const toS=x=>{x=String(x).replace(/[LS]/g,'');if(x.includes(':')){const[m,s]=x.split(':');return +m*60+ +s;}return +x||1e9;};
    if(cur.pbs[ev]===undefined||toS(t)<toS(cur.pbs[ev]))cur.pbs[ev]=t;
  }
  const meets=Object.keys(meetSet).sort((a,b)=>a.split('|')[1].localeCompare(b.split('|')[1]));
  const mid={}; const comps=meets.map((k,i)=>{const[n,d]=k.split('|');const id='pm'+Date.now().toString(36)+i;mid[k]=id;return {id,name:n,date:d,location:'',status:'completed'};});
  const nameById={}; swimmers.forEach(s=>nameById[s.id]=s.name);
  const outRes=results.map(r=>({id:uid(),compId:mid[r.meet+'|'+r.date],swimmerId:r.sid,swimmerName:nameById[r.sid]||'',event:r.event,time:r.dq?'DQ':r.time,place:r.place,heat:'',lane:'',dq:r.dq}));
  const outSw=swimmers.map(s=>({id:s.id,name:s.name,dob:ageToDob(s.age),age:s.age,group:'',gender:s.gender,phone:'',parentPhone:'',pbs:s.pbs,course:s.course}));
  return {swimmers:outSw,comps,results:outRes};
}

let _pdfjsLoading=null;
function loadPdfJs(){
  if(window.pdfjsLib)return Promise.resolve(window.pdfjsLib);
  if(_pdfjsLoading)return _pdfjsLoading;
  _pdfjsLoading=new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    s.onload=()=>{try{window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';res(window.pdfjsLib);}catch(e){rej(e);}};
    s.onerror=()=>rej(new Error('Could not load PDF engine (offline or blocked).'));
    document.head.appendChild(s);
  });
  return _pdfjsLoading;
}
async function extractPdfLines(file){
  const pdfjs=await loadPdfJs();
  const buf=await file.arrayBuffer();
  const pdf=await pdfjs.getDocument({data:buf}).promise;
  const lines=[];
  for(let p=1;p<=pdf.numPages;p++){
    const page=await pdf.getPage(p);
    const tc=await page.getTextContent();
    const rows={};
    tc.items.forEach(it=>{const y=Math.round(it.transform[5]);(rows[y]=rows[y]||[]).push([it.transform[4],it.str]);});
    Object.keys(rows).map(Number).sort((a,b)=>b-a).forEach(y=>{
      const line=rows[y].sort((a,b)=>a[0]-b[0]).map(x=>x[1]).join(' ');
      lines.push(line);
    });
  }
  return lines;
}

// ── SQUAD TOOLBAR (load squad + PDF import) ────────────────────
function SquadImport({data,onAssign}){
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState("");
  const loadEmbedded=()=>{
    if(!window.VORTEX_DATA)return setMsg("No embedded squad found.");
    if(!confirm("Reload the 272 real Vortex swimmers, 10 meets and all results? Swimmers are placed into squads by age; existing assignments are kept where names match."))return;
    const ex=expandSquad(window.VORTEX_DATA);
    const prev={}; data.swimmers.forEach(s=>{if(s.group)prev[s.id]=s.group;});
    ex.swimmers.forEach(s=>{ s.group=prev[s.id]||AGE_GROUP(s.age||getAge(s.dob)); });
    data.setSw(ex.swimmers); data.setCm(ex.comps); data.setRe(ex.results);
    setMsg(`Loaded ${ex.swimmers.length} swimmers and ${ex.results.length} results, placed into squads by age. Fine-tune under “Assign to coaches”. →`);
  };
  const onPdf=async e=>{
    const files=[...e.target.files]; if(!files.length)return;
    setBusy(true); setMsg("Reading PDF…");
    try{
      let allLines=[];
      for(const f of files){const ls=await extractPdfLines(f); allLines=allLines.concat(ls);}
      const parsed=parseHytekText(allLines);
      if(!parsed.swimmers.length){setMsg("No swimmers found — is this a Hy-Tek Team Manager results export?");setBusy(false);return;}
      if(!confirm(`Found ${parsed.swimmers.length} swimmers and ${parsed.results.length} results across ${parsed.comps.length} meets. Import and merge?`)){setBusy(false);setMsg("");return;}
      // merge swimmers by id, keep groups; append comps/results
      const byId={}; data.swimmers.forEach(s=>byId[s.id]=s);
      parsed.swimmers.forEach(s=>{if(byId[s.id])s.group=byId[s.id].group; byId[s.id]=s;});
      data.setSw(Object.values(byId));
      const compIds=new Set(data.comps.map(c=>c.id));
      data.setCm([...data.comps,...parsed.comps.filter(c=>!compIds.has(c.id))]);
      data.setRe([...data.results,...parsed.results]);
      setMsg(`Imported ${parsed.swimmers.length} swimmers and ${parsed.results.length} results.`);
    }catch(err){setMsg("PDF import failed: "+err.message);}
    setBusy(false); e.target.value="";
  };
  return <Box style={{padding:14,display:"flex",flexDirection:"column",gap:10,marginBottom:14}}>
    <div style={{fontWeight:700,fontSize:14}}>Squad data</div>
    <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
      <button onClick={loadEmbedded} style={{...mkBtn(),padding:"9px 14px"}}>⬇ Load Vortex squad (272)</button>
      <button onClick={onAssign} style={{...mkBtn(C.parent),padding:"9px 14px"}}>👥 Assign to coaches</button>
      <label style={{...mkBtn("#0891b2"),padding:"9px 14px",display:"inline-flex",alignItems:"center",cursor:busy?"default":"pointer",opacity:busy?.6:1}}>
        {busy?"⏳ Working…":"📄 Import PDF results"}
        <input type="file" accept="application/pdf" multiple disabled={busy} onChange={onPdf} style={{display:"none"}}/>
      </label>
    </div>
    <div style={{fontSize:11,color:C.muted,lineHeight:1.5}}>PDF import reads Hy-Tek Team Manager result exports (like your Male/Female PDFs). The existing Hy-Tek (.hy3/.cl2) importer still works from the Meets tab.</div>
    {msg&&<div style={{fontSize:12,color:C.ok,background:C.okBg,border:`1px solid ${C.ok}30`,borderRadius:8,padding:10}}>{msg}</div>}
  </Box>;
}

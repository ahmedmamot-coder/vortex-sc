  const fuzzyMatch=(a,b)=>{const norm=s=>s.toLowerCase().replace(/[^a-z]/g," ").trim();const na=norm(a),nb=norm(b);if(na===nb)return true;const wa=na.split(/\s+/).filter(x=>x.length>1),wb=nb.split(/\s+/).filter(x=>x.length>1);if(wa.length>=2&&wb.length>=2)return wa.every(w=>wb.includes(w))||wb.every(w=>wa.includes(w));return false;};
  const guessGroup=age=>{const a=parseInt(age)||0;return a?AGE_GROUP(a):"";};
  const buildProfiles=rows=>{const byName={};rows.forEach(r=>{const key=(r.swimmerName||"").trim().toLowerCase();if(!key)return;if(!byName[key])byName[key]={name:(r.swimmerName||"").trim(),gender:r.gender||"",age:r.age||"",team:r.team||"",group:r.group||"",pbs:{}};if(!r.dq&&r.time&&r.time!=="DQ"&&r.time!=="NT"){const cur=byName[key].pbs[r.event];if(!cur||toSec(r.time)<toSec(cur))byName[key].pbs[r.event]=r.time;}if(!byName[key].gender&&r.gender)byName[key].gender=r.gender;if(!byName[key].age&&r.age)byName[key].age=r.age;});return byName;};

  const impEntries=(rows,cid)=>{setEn(prev=>[...prev.filter(e=>e.compId!==cid),...rows]);setSw(prev=>{let sw=[...prev];rows.forEach(r=>{if(!sw.find(s=>fuzzyMatch(s.name,r.swimmerName||"")))sw.push({id:uid(),name:(r.swimmerName||"").trim(),dob:"",group:r.group||"",gender:r.gender||"M",phone:"",parentPhone:"",pbs:{},course:"LCM",importedFromHytek:true});});return sw;});};

  const impResults=(rows,cid)=>{setRe(prev=>[...prev,...rows]);const profiles=buildProfiles(rows);setSw(prev=>{let sw=[...prev];Object.values(profiles).forEach(profile=>{const existIdx=sw.findIndex(s=>fuzzyMatch(s.name,profile.name));if(existIdx>=0){const merged={...sw[existIdx].pbs};Object.entries(profile.pbs).forEach(([ev,t])=>{if(!merged[ev]||toSec(t)<toSec(merged[ev]))merged[ev]=t;});sw[existIdx]={...sw[existIdx],pbs:merged,gender:sw[existIdx].gender||profile.gender,importedFromHytek:true};}else{sw.push({id:uid(),name:profile.name,dob:"",group:profile.group||guessGroup(profile.age),gender:profile.gender||"M",phone:"",parentPhone:"",pbs:profile.pbs,course:"LCM",importedFromHytek:true,hyAge:profile.age||"",hyTeam:profile.team||""});}});return sw;});};

  const filt=swimmers.filter(s=>s.name.toLowerCase().includes(filter.toLowerCase())||s.group.toLowerCase().includes(filter.toLowerCase()));
  const statusCol=s=>s==="active"?C.ok:s==="completed"?C.muted:C.b2;

  function CompView({c}){
    const [cvTab,setCvTab]=useState("results");
    const [imp,setImp]=useState(false);
    const [showAdd,setShowAdd]=useState(false);
    const [af,setAf]=useState({swimmerId:swimmers[0]?.id||"",event:STROKES[0],time:"",place:"",heat:"",lane:"",dq:false});
    const afs=(k,v)=>setAf(f=>({...f,[k]:v}));
    const cr=results.filter(r=>r.compId===c.id);
    const ce=entries.filter(e=>e.compId===c.id);
    const evs=STROKES.filter(ev=>cr.some(r=>r.event===ev));
    const eevs=STROKES.filter(ev=>ce.some(e=>e.event===ev));
    const submitAdd=()=>{
      if(!af.time&&!af.dq)return;
      const sw=swimmers.find(s=>s.id===af.swimmerId);
      const r={id:uid(),compId:c.id,swimmerId:af.swimmerId,swimmerName:sw?.name,group:sw?.group,event:af.event,time:af.dq?"DQ":af.time,place:+af.place||"",heat:+af.heat||"",lane:+af.lane||"",age:"",gender:"",team:sw?.group||"",dq:af.dq};
      setRe(prev=>[...prev,r]);
      if(!r.dq){setSw(prev=>prev.map(s=>{if(s.id!==r.swimmerId)return s;const cur=s.pbs?.[r.event];if(!cur||toSec(r.time)<toSec(cur))return{...s,pbs:{...s.pbs,[r.event]:r.time}};return s;}));}
      setShowAdd(false);
    };
    return <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{background:C.grad,borderRadius:18,padding:20,color:"#fff"}}>
        <div onClick={()=>setComp(null)} style={{fontSize:12,color:"rgba(255,255,255,.75)",cursor:"pointer",marginBottom:10,display:"inline-flex",alignItems:"center",gap:4}}>← All Meets</div>
        <div style={{fontSize:20,fontWeight:800}}>{c.name}</div>
        <div style={{fontSize:12,opacity:.8,marginTop:2}}>{c.location} · {c.date}</div>
        <div style={{display:"flex",gap:24,marginTop:14}}>
          {[[ce.length,"Entries"],[cr.length,"Results"],[evs.length||eevs.length,"Events"]].map(([v,l])=><div key={l}><div style={{fontSize:22,fontWeight:800}}>{v}</div><div style={{fontSize:10,opacity:.75,fontWeight:600}}>{l}</div></div>)}
        </div>
      </div>
      <div style={{display:"flex",background:"#f0f4ff",borderRadius:12,padding:4,gap:4}}>
        {[["entries","📋 Entries"],["results","🏆 Results"]].map(([id,lb])=>(
          <div key={id} onClick={()=>setCvTab(id)} style={{flex:1,textAlign:"center",padding:"9px",borderRadius:10,cursor:"pointer",background:cvTab===id?"#fff":"transparent",fontWeight:cvTab===id?700:500,fontSize:13,color:cvTab===id?C.b2:C.muted,boxShadow:cvTab===id?C.shadow:"none"}}>{lb}</div>
        ))}
      </div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>setImp(true)} style={{...mkBtn(C.parent),padding:"10px 14px",fontSize:12,borderRadius:10,flex:2}}>📥 Import HY-TEK</button>
        {cvTab==="results"&&<button onClick={()=>setShowAdd(!showAdd)} style={{...mkBtn(C.b2,true),padding:"10px 14px",fontSize:12,borderRadius:10,flex:1,boxShadow:"none"}}>+ Add</button>}
      </div>
      {showAdd&&<Box style={{padding:16}}>
        <div style={{fontWeight:700,marginBottom:12}}>Add Result Manually</div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <select value={af.swimmerId} onChange={e=>afs("swimmerId",e.target.value)} style={IS}>{swimmers.map(s=><option key={s.id} value={s.id}>{s.name} ({s.group})</option>)}</select>
          <select value={af.event} onChange={e=>afs("event",e.target.value)} style={IS}>{STROKES.map(s=><option key={s}>{s}</option>)}</select>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8}}>
            <input value={af.time} onChange={e=>afs("time",e.target.value)} placeholder="Time" style={{...IS,fontFamily:"monospace"}}/>
            <input value={af.place} onChange={e=>afs("place",e.target.value)} placeholder="Pl" style={IS}/>
            <input value={af.heat} onChange={e=>afs("heat",e.target.value)} placeholder="Ht" style={IS}/>
            <input value={af.lane} onChange={e=>afs("lane",e.target.value)} placeholder="Ln" style={IS}/>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}><input type="checkbox" checked={af.dq} onChange={e=>afs("dq",e.target.checked)}/><span style={{color:C.err,fontSize:12,fontWeight:700}}>DQ</span></div>
          <div style={{display:"flex",gap:8}}><button onClick={()=>setShowAdd(false)} style={{...mkBtn("#6b7280",true),flex:1,boxShadow:"none"}}>Cancel</button><button onClick={submitAdd} style={{...mkBtn(),flex:2,background:C.grad}}>Save</button></div>
        </div>
      </Box>}
      {cvTab==="entries"&&(ce.length===0
        ?<Box style={{textAlign:"center",padding:40}}><div style={{fontSize:32,marginBottom:10}}>📋</div><div style={{fontWeight:700,color:C.text}}>No entries yet</div><div style={{fontSize:13,color:C.muted,marginTop:4}}>Import a HY-TEK entries file to get started.</div></Box>
        :eevs.map(ev=>{const evr=ce.filter(e=>e.event===ev).sort((a,b)=>toSec(a.seedTime)-toSec(b.seedTime));return <Box key={ev} style={{padding:0,overflow:"hidden",marginBottom:8}}><div style={{background:C.b2,padding:"9px 16px",display:"flex",justifyContent:"space-between"}}><span style={{fontWeight:700,fontSize:12,color:"#fff"}}>{ev}</span><span style={{fontSize:11,color:"rgba(255,255,255,.7)"}}>{evr.length}</span></div>{evr.map((e,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 16px",borderBottom:i<evr.length-1?`1px solid ${C.border}`:"none",background:"#fff"}}><Av name={e.swimmerName} sz={28}/><div style={{flex:1,fontWeight:600,fontSize:13}}>{e.swimmerName}<span style={{fontSize:11,color:C.muted,marginLeft:8}}>{e.group}</span></div><div style={{fontFamily:"monospace",fontSize:13,color:C.muted}}>{e.seedTime||"NT"}</div></div>)}</Box>;}))
      }
      {cvTab==="results"&&(cr.length===0
        ?<Box style={{textAlign:"center",padding:40}}><div style={{fontSize:32,marginBottom:10}}>🏆</div><div style={{fontWeight:700,color:C.text}}>No results yet</div></Box>
        :evs.map(ev=>{const evr=cr.filter(r=>r.event===ev).sort((a,b)=>toSec(a.time)-toSec(b.time));return <Box key={ev} style={{padding:0,overflow:"hidden",marginBottom:8}}><div style={{background:C.b2,padding:"10px 16px",display:"flex",justifyContent:"space-between"}}><span style={{fontWeight:700,fontSize:12,color:"#fff"}}>{ev}</span><span style={{fontSize:11,color:"rgba(255,255,255,.7)"}}>{evr.length}</span></div>{evr.map((r,i)=><div key={r.id} style={{display:"flex",alignItems:"center",gap:10,padding:"11px 16px",borderBottom:i<evr.length-1?`1px solid ${C.border}`:"none",background:i===0?"#fffbeb":"#fff"}}><div style={{width:28,fontWeight:700,fontSize:14,flexShrink:0}}>{r.dq?"DQ":medal(i)}</div><Av name={r.swimmerName} sz={28}/><div style={{flex:1}}><div style={{fontWeight:600,fontSize:13}}>{r.swimmerName}</div><div style={{fontSize:11,color:C.muted}}>{r.group}</div></div><div style={{fontFamily:"monospace",fontWeight:700,fontSize:15,color:r.dq?C.err:C.b2}}>{r.time}</div></div>)}</Box>;}))
      }
      {imp&&<HytekModal comps={[c]} swimmers={swimmers} onEntries={(rows,cid)=>{impEntries(rows,cid);setImp(false);}} onResults={(rows,cid)=>{impResults(rows,cid);setImp(false);}} onClose={()=>setImp(false)}/>}
    </div>;
  }

  if(coachAs)return <><SwitchBar label="Back to Admin" onSwitch={()=>setCoachAs(null)}/><CoachPortal user={{id:"admin",name:`Admin · ${coachAs}`,role:"coach",group:coachAs}} data={data}/></>;

  return <div style={{height:"100%",background:C.bg,display:"flex",flexDirection:"column"}}>
    <div style={{padding:"14px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",background:C.card,borderBottom:`1px solid ${C.border}`,flexShrink:0,boxShadow:C.shadow}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}><Logo sz={28}/><div><div style={{fontWeight:800,fontSize:13}}>Admin Portal</div><div style={{fontSize:10,color:C.muted}}>Vortex Swimming Club</div></div></div>
      <Tag label="Admin" col="#7c3aed"/>
    </div>
    <div style={{flex:1,overflowY:"auto",padding:"16px 16px 80px"}}>

      {tab==="dashboard"&&showIns&&<div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div onClick={()=>setShowIns(false)} style={{fontSize:13,color:C.b2,cursor:"pointer",fontWeight:700}}>← Dashboard</div>
        <Insights swimmers={swimmers} results={results} plans={plans} attend={attend} tracking={tracking} comps={comps} group={null}/>
      </div>}

      {tab==="dashboard"&&!showIns&&<div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div style={{fontSize:20,fontWeight:800,color:C.text}}>Dashboard</div>
        <Box onClick={()=>setShowIns(true)} style={{padding:16,display:"flex",alignItems:"center",gap:14,background:C.grad,border:"none",color:"#fff",boxShadow:C.shadowMd}}>
          <div style={{width:46,height:46,borderRadius:12,background:"rgba(255,255,255,.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>📊</div>
          <div style={{flex:1}}><div style={{fontWeight:800,fontSize:15}}>Club Insights</div><div style={{fontSize:12,opacity:.85,marginTop:2}}>Load, PB progression, wellness & attendance — club-wide</div></div>
          <span style={{fontSize:20}}>›</span>
        </Box>
        <Box style={{padding:16}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
            <div style={{width:38,height:38,borderRadius:10,background:C.b2+"15",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🏊‍♂️</div>
            <div><div style={{fontWeight:800,fontSize:15}}>Enter a squad as coach</div><div style={{fontSize:11,color:C.muted}}>Full coach tools — plans, attendance, boards, video</div></div>
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {GROUPS.map(g=><div key={g} onClick={()=>setCoachAs(g)} style={{cursor:"pointer",padding:"8px 14px",borderRadius:20,fontSize:12,fontWeight:700,background:"#f0f4ff",color:C.b2,border:`1px solid ${C.border}`}}>{g} <span style={{color:C.muted,fontWeight:500}}>· {swimmers.filter(s=>s.group===g).length}</span></div>)}
          </div>
        </Box>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {[[swimmers.length,"Swimmers","🏊",C.b2],[coaches.length,"Coaches","👤",C.ok],[parents.length,"Parents","👨‍👩‍👧",C.parent],[results.length,"Results","🏆",C.warn]].map(([v,l,ic,col])=>(
            <Box key={l} style={{padding:16,display:"flex",alignItems:"center",gap:12}}>
              <div style={{width:44,height:44,borderRadius:12,background:col+"15",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>{ic}</div>
              <div><div style={{fontSize:24,fontWeight:800,color:col}}>{v}</div><div style={{fontSize:11,color:C.muted,fontWeight:600}}>{l}</div></div>
            </Box>
          ))}
        </div>
        <div style={{fontSize:13,fontWeight:700,color:C.text,marginTop:4}}>Competitions</div>
        {comps.map(c=>(
          <Box key={c.id} onClick={()=>{setTab("meets");setComp(c);}} style={{padding:14,borderLeft:`3px solid ${statusCol(c.status)}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><div style={{fontWeight:700,fontSize:14}}>{c.name}</div><div style={{fontSize:11,color:C.muted,marginTop:2}}>{fmtD(c.date)}</div></div>
              <Tag label={c.status} col={statusCol(c.status)}/>
            </div>
          </Box>
        ))}
        <Box style={{padding:14,background:C.okBg,border:`1px solid #059669"+"22`}}>
          <div style={{fontSize:12,color:C.ok,fontWeight:700}}>✓ All data saves automatically to this device</div>
        </Box>
      </div>}

      {tab==="swimmers"&&assignView&&<AssignCoaches swimmers={swimmers} setSw={setSw} coaches={coaches} onBack={()=>setAssignView(false)}/>}
      {tab==="swimmers"&&!assignView&&<div style={{display:"flex",flexDirection:"column",gap:12}}>
        <SectionHeader title={`Swimmers (${swimmers.length})`} action={()=>setModal("addSw")} actionLabel="Add"/>
        <SquadImport data={data} onAssign={()=>setAssignView(true)}/>
        <div style={{position:"relative"}}><span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:C.muted,fontSize:14}}>🔍</span><input value={filter} onChange={e=>setFilter(e.target.value)} placeholder="Search name or group…" style={{...IS,paddingLeft:34}}/></div>
        {[...GROUPS,""].map(g=>{
          const gs=filt.filter(s=>(s.group||"")===g);if(!gs.length)return null;
          const label=g||"Unassigned";
          return <div key={g||"none"}>
            <div style={{fontSize:11,fontWeight:700,color:g?C.muted:C.warn,letterSpacing:1,marginBottom:8,marginTop:4}}>{label.toUpperCase()} ({gs.length}){!g&&<span onClick={()=>setAssignView(true)} style={{marginLeft:8,color:C.b2,cursor:"pointer",textTransform:"none",letterSpacing:0}}>assign →</span>}</div>
            {gs.slice(0,g?999:60).map(sw=>(
              <Box key={sw.id} onClick={()=>{setEd(sw);setModal("editSw");}} style={{marginBottom:8,padding:14,display:"flex",alignItems:"center",gap:12}}>
                <Av name={sw.name} sz={40}/>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:14}}>{sw.name}{sw.importedFromHytek&&<span style={{marginLeft:6,fontSize:10,color:C.b2,fontWeight:600,background:"#f0f4ff",borderRadius:6,padding:"1px 6px"}}>📥 HY-TEK</span>}</div>
                  <div style={{fontSize:11,color:C.muted,marginTop:2}}>{sw.group||"—"}{getAge(sw.dob)?` · ${getAge(sw.dob)} yrs`:""} · {sw.gender==="M"?"Male":"Female"}</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:5}}>{Object.entries(sw.pbs||{}).slice(0,3).map(([ev,t])=><span key={ev} style={{background:"#f0f4ff",color:C.b2,borderRadius:8,padding:"2px 8px",fontSize:10,fontFamily:"monospace",fontWeight:600}}>{ev}: {t}</span>)}</div>
                </div>
                <span style={{color:C.muted,fontSize:18}}>›</span>
              </Box>
            ))}
            {!g&&gs.length>60&&<div style={{fontSize:11,color:C.muted,textAlign:"center",marginBottom:8}}>+{gs.length-60} more unassigned — use “assign →”.</div>}
          </div>;
        })}
      </div>}

      {tab==="meets"&&(comp?<CompView c={comp}/>:<div style={{display:"flex",flexDirection:"column",gap:12}}>
        <SectionHeader title="Meets" action={()=>setModal("addCm")} actionLabel="Add"/>
        {comps.map(c=>{
          const ce2=entries.filter(e=>e.compId===c.id).length,cr2=results.filter(r=>r.compId===c.id).length;
          return <Box key={c.id} style={{padding:18,borderLeft:`4px solid ${statusCol(c.status)}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
              <div><div style={{fontWeight:800,fontSize:15}}>{c.name}</div><div style={{fontSize:12,color:C.muted,marginTop:2}}>{c.location} · {fmtD(c.date)}</div></div>
              <Tag label={c.status} col={statusCol(c.status)}/>
            </div>
            <div style={{display:"flex",gap:14,marginBottom:12}}>{ce2>0&&<span style={{fontSize:12,color:C.warn,fontWeight:700}}>📋 {ce2} entries</span>}{cr2>0&&<span style={{fontSize:12,color:C.ok,fontWeight:700}}>✓ {cr2} results</span>}{!ce2&&!cr2&&<span style={{fontSize:12,color:C.muted}}>No data yet</span>}</div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setComp(c)} style={{...mkBtn(),flex:2,padding:"8px 14px",fontSize:12,borderRadius:10}}>📊 Open</button>
              <button onClick={()=>{setEd(c);setModal("editCm");}} style={{...mkBtn("#6b7280",true),padding:"8px 14px",fontSize:12,borderRadius:10,boxShadow:"none"}}>✏️ Edit</button>
            </div>
          </Box>;
        })}
      </div>)}

      {tab==="staff"&&<div style={{display:"flex",flexDirection:"column",gap:12}}>
        <SectionHeader title={`Coaches (${coaches.length})`} action={()=>setModal("addCo")} actionLabel="Add"/>
        {coaches.map(c=>(
          <Box key={c.id} onClick={()=>{setEd(c);setModal("editCo");}} style={{padding:14,display:"flex",alignItems:"center",gap:12}}>
            <Av name={c.name} sz={44} col={C.b2}/>
            <div style={{flex:1}}><div style={{fontWeight:700,fontSize:14}}>{c.name}</div><div style={{fontSize:11,color:C.muted}}>{c.group}</div></div>
            <span style={{color:C.muted,fontSize:18}}>›</span>
          </Box>
        ))}
      </div>}

      {tab==="parents"&&<div style={{display:"flex",flexDirection:"column",gap:12}}>
        <SectionHeader title={`Parents (${parents.length})`} action={()=>setModal("addPa")} actionLabel="Add"/>
        <div style={{background:"#f5f0ff",border:`1px solid ${C.parent}22`,borderRadius:12,padding:12,fontSize:12,color:C.parent,lineHeight:1.6}}>Parents sign in with their PIN to view their child's PBs, results, plans and attendance.</div>
        {parents.length===0&&<Box style={{textAlign:"center",padding:40}}><div style={{fontSize:40,marginBottom:12}}>👨‍👩‍👧</div><div style={{fontWeight:700,color:C.text}}>No parents yet</div></Box>}
        {parents.map(p=>{
          const linked=swimmers.filter(s=>(p.swimmerIds||[]).includes(s.id));
          return <Box key={p.id} onClick={()=>{setEd(p);setModal("editPa");}} style={{padding:14,display:"flex",alignItems:"center",gap:12,borderLeft:`4px solid ${C.parent}`}}>
            <Av name={p.name} sz={44} col={C.parent}/>
            <div style={{flex:1}}><div style={{fontWeight:700,fontSize:14}}>{p.name}</div>{linked.length>0&&<div style={{fontSize:11,color:C.muted,marginTop:2}}>👤 {linked.map(s=>s.name).join(", ")}</div>}</div>
            <span style={{color:C.muted,fontSize:18}}>›</span>
          </Box>;
        })}
      </div>}
      {tab==="settings"&&<SettingsTab/>}
    </div>
    <Nav tabs={TABS} cur={tab} set={setTab}/>
    {modal==="editSw"&&ed&&<Pop title="Edit Swimmer" onClose={()=>{setModal(null);setEd(null);}} wide><SwimmerForm init={ed} onSave={sw=>{setSw(swimmers.map(s=>s.id===sw.id?sw:s));setModal(null);setEd(null);}} onDel={()=>{setSw(swimmers.filter(s=>s.id!==ed.id));setModal(null);setEd(null);}}/></Pop>}
    {modal==="addCm"&&<Pop title="Add Meet" onClose={()=>setModal(null)}><MeetForm onSave={c=>{setCm([...comps,{...c,id:uid()}]);setModal(null);}}/></Pop>}
    {modal==="editCm"&&ed&&<Pop title="Edit Meet" onClose={()=>{setModal(null);setEd(null);}}><MeetForm init={ed} onSave={c=>{setCm(comps.map(x=>x.id===c.id?c:x));setModal(null);setEd(null);}}/></Pop>}
    {modal==="addCo"&&<Pop title="Add Coach" onClose={()=>setModal(null)}><StaffForm onSave={c=>{setCo([...coaches,c]);setModal(null);}}/></Pop>}
    {modal==="editCo"&&ed&&<Pop title="Edit Coach" onClose={()=>{setModal(null);setEd(null);}}><StaffForm init={ed} onSave={c=>{setCo(coaches.map(u=>u.id===c.id?c:u));setModal(null);setEd(null);}} onDel={()=>{setCo(coaches.filter(u=>u.id!==ed.id));setModal(null);setEd(null);}}/></Pop>}
    {modal==="addPa"&&<Pop title="Add Parent" onClose={()=>setModal(null)} wide><ParentForm swimmers={swimmers} onSave={p=>{setPa([...parents,p]);setModal(null);}}/></Pop>}
    {modal==="editPa"&&ed&&<Pop title="Edit Parent" onClose={()=>{setModal(null);setEd(null);}} wide><ParentForm init={ed} swimmers={swimmers} onSave={p=>{setPa(parents.map(x=>x.id===p.id?p:x));setModal(null);setEd(null);}} onDel={()=>{setPa(parents.filter(x=>x.id!==ed.id));setModal(null);setEd(null);}}/></Pop>}
  </div>;
}

// ── LOGIN ──────────────────────────────────────────────────────
function Login({onLogin,data}){
  const {coaches=[],parents=[]}=data;
  const all=[ADMIN,HEAD,...coaches,...parents];

          {parents.map(u=>(

              <Av name={u.name} sz={38} col={C.parent}/>

// ── ROOT ───────────────────────────────────────────────────────
// ── HEAD COACH PORTAL (full access · enter any squad or admin) ──
function SwitchBar({label,onSwitch}){
  return <div onClick={onSwitch} style={{position:"fixed",top:12,left:14,zIndex:1000,background:C.grad,color:"#fff",border:"none",borderRadius:20,padding:"5px 14px",fontSize:11,cursor:"pointer",fontWeight:700,boxShadow:C.shadowMd,display:"flex",alignItems:"center",gap:6}}>⇄ {label}</div>;
}
function HeadCoachPortal({data}){
  const {swimmers,setSw,coaches,plans,results,comps,attend,tracking,setTr,boards,setBd,bResults,setBr,videos,setVd,lounge,setLo}=data;
  const [view,setView]=useState(null); // null | "admin" | "tools" | group
  const [tool,setTool]=useState(null);
  const headUser={id:"head",name:"Head Coach",role:"head",group:""};
  const coachOf={}; (coaches||[]).forEach(c=>{if(c.group)coachOf[c.group]=c.name;});
  const countOf=g=>swimmers.filter(s=>s.group===g).length;

  const HC_TOOLS=[
    {id:"insights",icon:"📊",label:"Insights Dashboard",desc:"Club-wide load, PBs, wellness, trends",col:C.b2},
    {id:"boards",icon:"🏆",label:"Boards",desc:"Test-set leaderboards & custom metrics",col:C.b2},
    {id:"video",icon:"🎥",label:"Video Analysis",desc:"Race review, splits & velocity",col:C.parent},
    {id:"lounge",icon:"💬",label:"Vortex Lounge",desc:"Share sets, wins & videos",col:C.wa},
    {id:"goals",icon:"🎯",label:"Season Goals",desc:"Target times & progress vs PB",col:"#0891b2"},
    {id:"season",icon:"🗓️",label:"AI Season Architect",desc:"Generate a periodised season plan",col:C.parent},
    {id:"analysis",icon:"📈",label:"Swimmer Analysis",desc:"Progress, PBs & event breakdown",col:C.b2},
    {id:"tracking",icon:"📋",label:"Swimmer Tracking",desc:"Weight, sleep, HR & wellness logs",col:C.ok},
    {id:"fitness",icon:"💪",label:"Dryland & Fitness AI",desc:"AI-built gym & dryland workouts",col:C.warn},
    {id:"nutrition",icon:"🥗",label:"Nutrition Advisor",desc:"AI fuelling & recovery guidance",col:"#16a34a"},
    {id:"correction",icon:"🔍",label:"AI Workout Review",desc:"Get your sets checked & corrected",col:C.parent},
    {id:"handbook",icon:"📖",label:"Coach Handbook",desc:"Zones, volumes & methodology",col:"#dc2626"},
  ];

  if(view==="admin")return <><SwitchBar label="Head Coach menu" onSwitch={()=>setView(null)}/><AdminPortal user={{id:"head",name:"Head Coach",role:"admin",group:""}} data={data}/></>;
  if(view==="assign")return <div style={{height:"100%",background:C.bg,overflowY:"auto",padding:"52px 16px 40px"}}><SwitchBar label="Head Coach menu" onSwitch={()=>setView(null)}/><AssignCoaches swimmers={swimmers} setSw={setSw} coaches={coaches} onBack={()=>setView(null)}/></div>;
  if(view&&GROUPS.includes(view))return <><SwitchBar label="Switch squad" onSwitch={()=>setView(null)}/><CoachPortal user={{id:"head",name:`Head Coach · ${view}`,role:"coach",group:view}} data={data}/></>;

  if(view==="tools"){
    const active=HC_TOOLS.find(t=>t.id===tool);
    return <div style={{height:"100%",background:C.bg,display:"flex",flexDirection:"column"}}>
      <SwitchBar label="Head Coach menu" onSwitch={()=>{setView(null);setTool(null);}}/>
      <div style={{flex:1,overflowY:"auto",padding:"52px 16px 40px"}}>
        {!tool?<>
          <div style={{fontSize:19,fontWeight:800,marginBottom:2}}>Tools & AI</div>
          <div style={{fontSize:12,color:C.muted,marginBottom:16}}>Club-wide — across all {swimmers.length} swimmers</div>
          {HC_TOOLS.map(t=><Box key={t.id} onClick={()=>setTool(t.id)} style={{padding:14,display:"flex",alignItems:"center",gap:12,marginBottom:8,cursor:"pointer",borderLeft:`4px solid ${t.col}`}}>
            <div style={{width:40,height:40,borderRadius:11,background:t.col+"15",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>{t.icon}</div>
            <div style={{flex:1}}><div style={{fontWeight:700,fontSize:14}}>{t.label}</div><div style={{fontSize:11,color:C.muted}}>{t.desc}</div></div>
            <span style={{fontSize:18,color:C.muted}}>›</span>
          </Box>)}
        </>:<>
          <div onClick={()=>setTool(null)} style={{fontSize:13,color:C.b2,cursor:"pointer",fontWeight:700,marginBottom:14}}>← All tools</div>
          {tool==="insights"&&<Insights swimmers={swimmers} results={results} plans={plans} attend={attend} tracking={tracking} comps={comps} group={null}/>}
          {tool==="boards"&&<Boards swimmers={swimmers} boards={boards} setBd={setBd} bResults={bResults} setBr={setBr} group={null}/>}
          {tool==="video"&&<VideoLab swimmers={swimmers} videos={videos} setVd={setVd} group={null}/>}
          {tool==="lounge"&&<Lounge user={headUser} lounge={lounge} setLo={setLo}/>}
          {tool==="goals"&&<Goals swimmers={swimmers} setSw={setSw} results={results} group={null}/>}
          {tool==="season"&&<SeasonArchitectAI group={null}/>}
          {tool==="analysis"&&<SwimmerAnalysis swimmers={swimmers} results={results} group={null}/>}
          {tool==="tracking"&&<SwimmerTracking swimmers={swimmers} group={null} tracking={tracking} setTr={setTr}/>}
          {tool==="fitness"&&<FitnessAI group={null}/>}
          {tool==="nutrition"&&<NutritionAI group={null}/>}
          {tool==="correction"&&<WorkoutCorrectionAI group={null}/>}
          {tool==="handbook"&&<Handbook/>}
        </>}
      </div>
    </div>;
  }

  return <div style={{height:"100%",background:C.bg,display:"flex",flexDirection:"column"}}>
    <div style={{padding:"18px 18px 14px",background:C.grad,color:"#fff",flexShrink:0}}>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <div style={{width:46,height:46,borderRadius:14,background:"rgba(255,255,255,.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>★</div>
        <div><div style={{fontSize:19,fontWeight:800}}>Head Coach</div><div style={{fontSize:12,opacity:.85}}>Full club access — squads, admin, tools & AI</div></div>
      </div>
    </div>
    <div style={{flex:1,overflowY:"auto",padding:"16px 16px 40px"}}>
      <div style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:1,marginBottom:8}}>CLUB</div>
      <Box onClick={()=>setView("admin")} style={{padding:16,display:"flex",alignItems:"center",gap:14,marginBottom:8,cursor:"pointer",borderLeft:`4px solid ${C.parent}`}}>
        <div style={{width:44,height:44,borderRadius:12,background:C.parent+"15",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>⚙️</div>
        <div style={{flex:1}}><div style={{fontWeight:800,fontSize:15}}>Club Administration</div><div style={{fontSize:12,color:C.muted,marginTop:2}}>Swimmers, meets, staff, parents, settings, insights</div></div>
        <span style={{fontSize:20,color:C.muted}}>›</span>
      </Box>
      <Box onClick={()=>{setView("tools");setTool(null);}} style={{padding:16,display:"flex",alignItems:"center",gap:14,marginBottom:8,cursor:"pointer",borderLeft:`4px solid ${C.warn}`}}>
        <div style={{width:44,height:44,borderRadius:12,background:C.warn+"15",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>🧰</div>
        <div style={{flex:1}}><div style={{fontWeight:800,fontSize:15}}>Tools & AI</div><div style={{fontSize:12,color:C.muted,marginTop:2}}>Insights, boards, video, goals + all AI assistants — club-wide</div></div>
        <span style={{fontSize:20,color:C.muted}}>›</span>
      </Box>
      <Box onClick={()=>setView("assign")} style={{padding:16,display:"flex",alignItems:"center",gap:14,marginBottom:16,cursor:"pointer",borderLeft:`4px solid ${C.b2}`}}>
        <div style={{width:44,height:44,borderRadius:12,background:C.b2+"15",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>🔀</div>
        <div style={{flex:1}}><div style={{fontWeight:800,fontSize:15}}>Move swimmers between squads</div><div style={{fontSize:12,color:C.muted,marginTop:2}}>Reassign any swimmer to any team · search & bulk</div></div>
        <span style={{fontSize:20,color:C.muted}}>›</span>
      </Box>
      <div style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:1,marginBottom:8}}>SQUADS — enter as coach (full edit)</div>
      {GROUPS.map(g=><Box key={g} onClick={()=>setView(g)} style={{padding:14,display:"flex",alignItems:"center",gap:12,marginBottom:8,cursor:"pointer"}}>
        <div style={{width:42,height:42,borderRadius:11,background:C.b2+"15",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:800,color:C.b2}}>{countOf(g)}</div>
        <div style={{flex:1}}><div style={{fontWeight:700,fontSize:14}}>{g}</div><div style={{fontSize:11,color:C.muted}}>{coachOf[g]?coachOf[g]:"No coach assigned"} · {countOf(g)} swimmers</div></div>
        <span style={{fontSize:18,color:C.muted}}>›</span>
      </Box>)}
    </div>
  </div>;
}


function App(){
  const [page,setPage]=useState("landing");
  const [me,setMe]=useState(null);
  const data=useData();
  if(page==="landing")return <Landing onEnter={()=>setPage("login")}/>;
  if(page==="login")return <Login onLogin={u=>{setMe(u);setPage("app");}} data={data}/>;
  if(page==="app"&&me)return(
    <div style={{height:"100vh",overflow:"hidden"}}>
      <button onClick={()=>{setMe(null);setPage("landing");}} style={{position:"fixed",top:12,right:14,zIndex:999,background:"rgba(0,0,0,.07)",border:"none",color:C.muted,borderRadius:20,padding:"5px 14px",fontSize:11,cursor:"pointer",fontWeight:600}}>Sign Out</button>
      <div style={{height:"100%",overflowY:"auto"}}>
        {me.role==="admin"&&<AdminPortal user={me} data={data}/>}
        {me.role==="head"&&<HeadCoachPortal data={data}/>}
        {me.role==="coach"&&<CoachPortal user={me} data={data}/>}
        {me.role==="parent"&&<ParentPortal user={me} data={data}/>}
      </div>
    </div>
  );
  return <Login onLogin={u=>{setMe(u);setPage("app");}} data={data}/>;
}

// ── SEED REAL VORTEX SQUAD (auto-installs the 272 swimmers) ────
const SEED_VER="vtx-squad-2026-2-9teams";
(function ensureSeed(){
  try{
    if(sGet(SK.seed)===SEED_VER || !window.VORTEX_DATA) return;
    const ex=expandSquad(window.VORTEX_DATA);
    ex.swimmers.forEach(s=>{ s.group=AGE_GROUP(s.age||getAge(s.dob)); });
    sSet(SK.sw, ex.swimmers);
    sSet(SK.cm, ex.comps);
    sSet(SK.re, ex.results);
    sSet(SK.co, DEF.coaches());
    sSet(SK.seed, SEED_VER);
  }catch(e){ console.error("seed failed",e); }
})();

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
